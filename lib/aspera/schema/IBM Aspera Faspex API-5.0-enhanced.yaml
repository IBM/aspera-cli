          type: integer
          default: 10
          maximum: 30
          minimum: 1
        mfa_max_attempts_upload:
          description: Specifies how many times a user may attempt to enter the multi-factor authentication code for public invitations.
          type: integer
          default: 3
          maximum: 5
          minimum: 1
