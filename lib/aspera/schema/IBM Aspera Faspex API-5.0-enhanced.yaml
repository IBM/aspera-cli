openapi: 3.1.0
info:
  title: IBM Aspera Faspex API
  version: '5.0'
  description: |-
    Use the Faspex API to:
      * send, view, and download packages
      * manage and work with shared inboxes and shared folders
      * manage users and workgroups
      * configure your Faspex server
  license:
    name: (c) IBM. All rights reserved
servers:
  - url: https://{host}{main_path}{version_path}
    description: The main URL of the server
    variables:
      host:
        description: The host of the server
        default: faspex.example.com
      main_path:
        description: The main path of the server
        default: /aspera/faspex
      version_path:
        description: Version of API (path)
        default: /api/v5
        enum:
          - /api/v5
          - /auth
          - ''
paths:
  /advanced_configuration:
    get:
      operationId: getAdvancedServerConfiguration
      summary: Get advanced configurations
      description: Returns a hash of the Faspex server advanced configuration.
      responses:
        '200':
          description: ' - OK - Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAdvancedConfiguration'
        '400':
          description: ' - Bad Request'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidValue'
        '401':
          description: ' - Unauthorized'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncorrectCredentials'
        '500':
          description: ' - Internal Error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigurationMissing'
      security:
        - OAuth2:
            - user
            - manager
            - admin
      tags:
        - Server configuration
    put:
      operationId: updateAdvancedServerConfiguration
      summary: Update advanced configurations
      description: Returns a hash of the Faspex server advanced configuration.
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutAdvancedConfiguration'
      responses:
        '200':
          description: ' - OK - Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetAdvancedConfiguration'
        '400':
          description: ' - Bad Request'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidValue'
        '401':
          description: ' - Unauthorized'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncorrectCredentials'
        '500':
          description: ' - Internal Error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConfigurationMissing'
      security:
        - OAuth2:
            - admin
      tags:
        - Server configuration
  /authorize:
    get:
      operationId: authorizeToRegisteredOAuthClient
      summary: Authorize to a registered OAuth client
      description: When you call this endpoint, you are redirected to the Faspex login page to log in as a user. By logging in, you are implicitly authorizing the client to act as that user. Once authenticated, you are redirected to the given `redirect_uri`. Implement a GET endpoint that matches the `redirect_uri` on your application that can recieve and handle the URL-encoded authorization code.
      parameters:
        - name: client_id
          in: query
          description: OAuth client ID.
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
        - name: redirect_uri
          in: query
          description: The URL to redirect users to after successful authentication. Must use the HTTPS protocol.
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
        - name: response_type
          in: query
          description: The authorization response format.
          required: true
          schema:
            type: string
            enum:
              - code
              - token
            maxLength: 255
            minLength: 1
        - name: state
          in: query
          description: A unique string to verify the identity of the auth server. It is used to prevent CSRF attacks.
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
        - name: code_challenge
          in: query
          description: The code challenge is a Base64-encoded SHA256 hash of the code verifier. The code challenge is used for PKCE requests.
          required: false
          schema:
            type: string
            maxLength: 255
            minLength: 1
        - name: code_challenge_method
          in: query
          description: The code challenge method used to generate code challenge. The code challenge is used for PKCE requests.
          required: false
          schema:
            type: string
            enum:
              - plain
              - s256
            maxLength: 255
            minLength: 1
        - name: local
          in: query
          description: Specifies whether to redirect user to the Faspex login screen. Use this param to bypass automatic redirection to a SAML Identity Provider.
          required: false
          schema:
            type: string
            const: 'true'
            maxLength: 255
            minLength: 1
      responses:
        '302':
          description: Success URL redirection
          content:
            application/x-www-form-urlencoded:
              schema:
                description: 'The URL the auth server redirects the user to. Syntax: redirect_uri?code=value&&state=value'
                type: string
                examples:
                  - https://myapp.com?code=1gSePEcHe&state=asdlfijeq276323
                maxLength: 255
                minLength: 1
        '400':
          description: ' - Bad request'
          content:
            application/x-www-form-urlencoded:
              schema:
                type: object
                properties:
                  status:
                    description: Bad Request
                    type: string
                  code:
                    type: integer
                  message:
                    description: Invalid parameters
                    type: string
                  request_id:
                    description: A unique request ID that can be used to trace a request from end-to-end.
                    type: string
        '401':
          description: ' - Unauthorized'
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/IncorrectCredentials'
        '404':
          description: ' - Not Found'
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/ClientNotFound'
        '500':
          description: ' - Internal Error'
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/InternalError'
      servers:
        - url: https://{host}{main_path}{version_path}
          variables:
            host:
              default: faspex.example.com
            main_path:
              default: /aspera/faspex
            version_path:
              default: /auth
      tags:
        - Authorization
  /authenticate:
    post:
      operationId: authenticateBasicAuthToRegisteredOAuthClient
      summary: Request an authorization code
      description: Returns authorization code for a registered OAuth client, authenticated using HTTP basic auth.
      parameters:
        - name: client_id
          in: query
          description: OAuth client ID.
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
      responses:
        '200':
          description: ' - OK - Successful response'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    description: The authorization code to be used in POST /auth/token API.
                    type: string
                    maxLength: 255
                    minLength: 1
        '400':
          description: ' - Bad Request'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParameterNotPermitted'
        '401':
          description: ' - Unauthorized'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncorrectCredentials'
        '404':
          description: ' - Not Found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: ' - Internal Error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'
      security:
        - BasicAuth: []
      servers:
        - url: https://{host}{main_path}{version_path}
          variables:
            host:
              default: faspex.example.com
            main_path:
              default: /aspera/faspex
            version_path:
              default: /auth
      tags:
        - Authorization
  /authorize/public_link:
    get:
      operationId: authorizePubToRegisteredOAuthClient
      summary: Request an authorization code for public link
      description: When you call this endpoint and link requires multi factor authentication, you are redirected to enter verification code page or if link does not require multi factor authentication, you are redirected to the given redirect_uri. Implement a GET endpoint that matches the redirect_uri on your application that can recieve and handle the URL-encoded authorization code.
      parameters:
        - name: client_id
          in: query
          description: OAuth client ID.
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
        - name: redirect_uri
          in: query
          description: The URL to redirect users to after successful authentication. Must use the HTTPS protocol.
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
        - name: resource_type
          in: query
          description: The public link resource type.
          required: true
          schema:
            type: string
            enum:
              - external_upload_to_shared_inbox
              - external_upload_to_user
              - external_download_package
            maxLength: 255
            minLength: 1
        - name: state
          in: query
          description: A unique string to verify the identity of the auth server. It is used to prevent CSRF attacks.
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
      responses:
        '302':
          description: Success URL redirection
          content:
            application/x-www-form-urlencoded:
              schema:
                description: 'The URL the auth server redirects the user to. Syntax: redirect_uri?code=value&state=value'
                type: string
                examples:
                  - https://myapp.com?code=1gSePEcHe&state=asdlfijeq276323
                maxLength: 255
                minLength: 1
        '400':
          description: ' - Bad request'
          content:
            application/x-www-form-urlencoded:
              schema:
                type: object
                properties:
                  status:
                    description: Bad Request
                    type: string
                  code:
                    type: integer
                  message:
                    description: Invalid parameters
                    type: string
                  request_id:
                    description: A unique request ID that can be used to trace a request from end-to-end.
                    type: string
        '401':
          description: ' - Unauthorized'
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/IncorrectCredentials'
        '404':
          description: ' - Not Found'
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/ClientNotFound'
        '500':
          description: ' - Internal Error'
          content:
            application/x-www-form-urlencoded:
              schema:
                $ref: '#/components/schemas/InternalError'
      security:
        - PasscodeAuth: []
      servers:
        - url: https://{host}{main_path}{version_path}
          variables:
            host:
              default: faspex.example.com
            main_path:
              default: /aspera/faspex
            version_path:
              default: /auth
      tags:
        - Authorization
