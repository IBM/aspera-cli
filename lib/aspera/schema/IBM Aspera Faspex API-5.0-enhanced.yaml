    AllPackageRequest:
      description: Request query to browse files in a package
      type: object
      properties:
        path:
          description: The full pathname of the directory to browse.
          type: string
          examples:
            - /
          maxLength: 255
          minLength: 1
        iteration_token:
          description: The iteration token to explore the current page. For the first page, this is not required, and the next page token will be returned in the request headers as "x-aspera-next-iteration-token".
          type: string
          maxLength: 255
          minLength: 1
        filters:
          description: Filter response content by these criteria.
          type: object
          properties:
            basenames:
              description: 'Only include results with basenames that match the specified basenames. (Note: Glob patterns are also supported through **[["glob_pattern_here"]]** syntax. For example, use **[["\*example\*"]]** syntax for partial matches.)'
              type: array
              items:
                minLength: 1
                maxLength: 255
                type: string
              examples:
                - - /usr/home
            types:
              description: Only include results that match the specified content types
              type: array
              items:
                minLength: 1
                maxLength: 255
                type: string
                enum:
                  - file
                  - symbolic_link
                  - directory
              examples:
                - - file
                  - directory
      required:
        - path
    GetPackageRequest:
      description: Request query to browse files in a package
      type: object
      properties:
        path:
          description: The full pathname of the directory to browse.
          type: string
          examples:
            - /
          maxLength: 255
          minLength: 1
        case_sensitive:
          description: Specify whether to treat the sort and basename values as case sensitive.
          type: boolean
          examples:
            - true
          default: false
        sort:
          description: Sort the results by "path", "type" (directory/file), "size_a"(bytes, ascending), "size_d" (bytes, descending), "mtime_a" (modification date, ascending), or "mtime_d" (modification date, descending).
          type: string
          examples:
            - mtime_a
          enum:
            - path
            - type
            - size_a
            - size_d
            - mtime_a
            - mtime_d
          maxLength: 255
          minLength: 1
        filters:
          description: Filter response content by these criteria.
          type: object
          properties:
            basenames:
              description: 'Only include results with basenames that match the specified basenames. (Note: Glob patterns are also supported through **[["glob_pattern_here"]]** syntax. For example, use **[["\*example\*"]]** syntax for partial matches.)'
              type: array
              items:
                minLength: 1
                maxLength: 255
                type: string
              examples:
                - - /usr/home
            mtime_max:
              description: Only include results updated before this time. Use the format "2011-01-31T12:59:59Z", with T or space in the middle. Z is optional at the end.
              type: string
              examples:
                - 2011-01-31 11:59:59
              maxLength: 255
              minLength: 1
            mtime_min:
              description: Only include results updated after this time. Use the format "2011-01-31T12:59:59Z", with T or space in the middle. Z is optional at the end.
              type: string
              examples:
                - 2011-01-01 00:00:00
              maxLength: 255
              minLength: 1
            paths:
              description: Only include results that match the path names.
              type: array
              items:
                minLength: 1
                maxLength: 255
                type: string
              examples:
                - - /directory/
            size_max:
              description: Only include files that are less than this size in bytes.This setting automatically restricts the results to files (equivalent to setting "types":["file"]).
              type: string
              examples:
                - '10000'
              maxLength: 255
              minLength: 1
            size_min:
              description: Only include files that are larger than or equal to this size in bytes. This setting automatically restricts the results to files (equivalent to setting "types":["file"]).
              type: string
              examples:
                - '1000'
              maxLength: 255
              minLength: 1
            types:
              description: Only include results that match the specified content types
              type: array
              items:
                minLength: 1
                maxLength: 255
                type: string
                enum:
                  - file
                  - symbolic_link
                  - directory
              examples:
                - - file
                  - directory
      required:
        - path
