          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'
      security:
        - OAuth2:
            - user
      tags:
        - Distribution lists
    put:
      operationId: updateDistributionList
      summary: Update a distribution list
      parameters:
        - name: id
          in: path
          description: The resource ID.
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PutDistributionList'
