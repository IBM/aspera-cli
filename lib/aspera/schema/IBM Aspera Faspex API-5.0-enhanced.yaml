                type: string
                default: never
                enum:
                  - never
                  - after_one_upload
                  - after_one_upload_or_date
                  - on_date
                maxLength: 255
                minLength: 1
              expires:
                description: The date this invitation expires. Required when expiration is set to after_one_upload_or_date,on_date
                type: string
                format: date-time
                maxLength: 255
                minLength: 1
              status:
                description: Status for the invitation or member. Unless invitation is expired, this refers to member status.
                type: string
                enum:
                  - expired
                  - active
                  - inactive
                  - locked
                  - pending_approval
                  - saml_configuration_disabled
                maxLength: 255
                minLength: 1
              access_url:
                description: Access URL for this invitation.
                type: string
                maxLength: 255
                minLength: 1
              mfa_failed_attempts:
                description: The number of times the user has attempted to enter the multi-factor authentication code.
                type: integer
                default: 0
              mfa_lockout_time:
                description: Specifies how long the user has locked out for.
                type: string
                format: date-time
                maxLength: 255
                minLength: 1
              access:
                description: The member access level.
                type: string
                default: standard
                enum:
                  - submit_only
                  - standard
                  - shared_inbox_admin
                maxLength: 255
                minLength: 1
              is_wg_admin:
                description: Specifies whether shared inbox members are admins.
                type: boolean
                default: false
        errors:
          description: Errors
          type: array
          items:
            type: object
            description: Error
            properties:
