          description: Custom or Default inbox destination ID. When its Default inbox, the inbox_destination_share_id will be default inbox share id. **Required if inbox_type is custom**.
          type: string
          maxLength: 255
          minLength: 1
        upload_directly_to_custom_inbox:
          description: Specifies whether members upload directly to the custom inbox. When the shared inbox is the only recipient of a package, the package is not uploaded to the default inbox.
          type: boolean
        enable_relay:
          description: Enable relays. Relays transfer a copy of the package to another node.
          type: boolean
        allow_public_url:
          description: Allow public URL. **Permitted when the server setting allows shared inboxes to set public url settings**.
          type: string
          default: default
          enum:
            - yes
            - no
            - default
          maxLength: 255
          minLength: 1
        public_url:
          description: Public URL for shared inbox submission. **returned when allow_public_url is enabled**.
          type: string
          maxLength: 255
          minLength: 1
        metadata_profile_id:
          description: ID of the shared inbox's default metadata profile.
          type: string
          maxLength: 255
          minLength: 1
        save_metadata_to_file:
          description: Save metadata to file. The metadata is saved as aspera-metadata.xml file in the root directory of each package.
          type: boolean
        admin_can_manage_existing_users:
          description: Specifies whether shared inbox admins can add existing Faspex users and remove non-admin members.
          type: boolean
        admin_can_manage_external_submitters:
          description: Specifies whether admins can invite and remove outside submitters.
          type: boolean
          default: true
        users_can_invite_external_submitters:
          description: Specifies whether regular users can invite outside submitters.
          type: boolean
        released_packages_count:
          description: Total number of available packages for the shared inbox.
          type: integer
        custom_package_expiration_policy:
          description: Specifies whether to enable the custom package expiration policy.
          type: boolean
        package_expiration_days:
          description: Days until packages expire. **Required when set_package_expiration is true**.
          type: integer
        set_package_expiration:
          description: Specifies whether packages expire after a period of days.
          type: boolean
        delete_package_after_download_policy:
