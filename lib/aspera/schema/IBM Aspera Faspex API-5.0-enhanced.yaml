            - user
      tags:
        - Distribution lists
  /account/distribution_lists/{id}:
    get:
      operationId: getDistributionList
      summary: Get a distribution list
      parameters:
        - name: id
          in: path
          description: The resource ID.
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
      responses:
        '200':
          description: ' - OK - Successful response'
          content:
