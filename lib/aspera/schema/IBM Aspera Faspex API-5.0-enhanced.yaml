    AllNodeBrowse:
      description: Request query to browse node content.
      type: object
      properties:
        path:
          description: The full pathname of the directory to browse.
          type: string
          examples:
            - /
          maxLength: 255
          minLength: 1
        iteration_token:
          description: The iteration token to explore the current page. For the first page, this is not required, and the next page token will be returned in the request headers as "x-aspera-next-iteration-token".
          type: string
          maxLength: 255
          minLength: 1
        filters:
          description: Filter response content by these criteria.
          type: object
          properties:
            basenames:
              description: 'Only include results with basenames that match the specified basenames. (Note: Glob patterns are also supported through **[["glob_pattern_here"]]** syntax. For example, use **[["\*example\*"]]** syntax for partial matches.)'
              type: array
              items:
                minLength: 1
                maxLength: 255
                type: string
              examples:
                - - /usr/home
            types:
              description: Only include results that match the specified content types
              type: array
              items:
                minLength: 1
                maxLength: 255
                type: string
                enum:
                  - file
                  - symbolic_link
                  - directory
              examples:
                - - file
                  - directory
            include_sub_dir:
              description: Specifies whether subdirectories should be included in the filter search.
              type: boolean
    GetNodeBrowse:
      description: Response of node query.
      type: object
      properties:
        self:
          description: File Details
          type: array
          items:
            type: object
            description: File details
            properties:
              path:
                description: The pathname of the file, directory, or symbolic link.
                type: string
                examples:
                  - /project1/src
                maxLength: 255
                minLength: 1
              basename:
                description: The base name of the path.
                type: string
                examples:
                  - project1
                maxLength: 255
                minLength: 1
              type:
                description: 'The type of the path. '
                type: string
                examples:
                  - directory
                enum:
                  - file
                  - directory
                  - symbolic_link
                maxLength: 255
                minLength: 1
              size:
                description: The size of the file or symbolic link in bytes. Directory size is reported as 0.
                type: string
                examples:
                  - 0
                maxLength: 255
                minLength: 1
              mtime:
                description: The item's modification time in ISO format.
                type: string
                examples:
                  - 2021-06-22T16:51:05Z
                maxLength: 255
                minLength: 1
              permissions:
                description: List of permissions.
                type: array
                items:
                  type: object
                  description: Permissions
                  properties:
                    name:
                      description: The permissions set on the content.
                      type: string
                      enum:
                        - view
                        - edit
