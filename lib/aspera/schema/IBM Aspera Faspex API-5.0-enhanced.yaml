                type: string
                maxLength: 255
                minLength: 1
        details:
          description: Operation details
          type: object
          properties:
            failed:
              description: List of failures.
              type: array
              items:
                minLength: 1
                maxLength: 255
                type: string
                description: IDs of the members for who addition failed.
            succeeded:
              description: List of successes.
              type: array
              items:
                minLength: 1
                maxLength: 255
                type: string
                description: IDs of the members who were successfully added.
