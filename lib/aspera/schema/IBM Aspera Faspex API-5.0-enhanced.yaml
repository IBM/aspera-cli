    GetTransfer:
      description: Transfer details
      type: object
      properties:
        id:
          description: Unique ID of the transfer (same as "id").
          type: string
          examples:
            - a547f94e-84f4-47ec-a397-0f5c20cf07c7
          maxLength: 255
          minLength: 1
        status:
          description: The status of the transfer.
          type: string
          examples:
            - completed
          enum:
            - waiting
            - running
            - completed
            - partially_completed
            - failed
            - canceled
            - orphaned
          maxLength: 255
          minLength: 1
        start_spec:
          oneOf:
            - $ref: '#/components/schemas/GetUploadTransferSpec'
            - $ref: '#/components/schemas/GetDownloadTransferSpec'
        sessions:
          description: TransferSpec (sessions)
          type: object
          properties:
            id:
              description: Unique ID of the transfer.
              type: string
              examples:
                - 47eeb333-0aba-4837-a979-e5d8878cc25e
              maxLength: 255
              minLength: 1
            client_node_id:
              description: Local node ID.
              type: string
              examples:
                - 58fec433-1acd-1539-d872-e5c8974aa22e
              maxLength: 255
              minLength: 1
            server_node_id:
              description: Remote node ID.
              type: string
              examples:
                - 7e056e9d-466b-48fa-9a45-5043161338bb
              maxLength: 255
              minLength: 1
            client_ip_address:
              description: The IP address of the local node.
              type: string
              examples:
                - 10.0.0.1
              maxLength: 255
              minLength: 1
            server_ip_address:
              description: The IP address of the remote node.
              type: string
              examples:
                - 10.0.0.2
              maxLength: 255
              minLength: 1
            status:
              description: The status of the session. If the transfer uses one session, the session status should match the transfer status.
              type: string
              examples:
                - completed
              enum:
                - waiting
                - running
                - completed
                - partially_completed
                - failed
                - canceled
                - orphaned
              maxLength: 255
              minLength: 1
            retry_timeout:
              description: The retry timeout set on the server.
              type: integer
              examples:
                - 90
            retry_count:
              description: The number of retries for the session.
              type: integer
              examples:
                - 0
            start_time_usec:
              description: Transfer session start time in microseconds since the server's epoch time.
              type: integer
              examples:
                - 1623863216000000===
            end_time_usec:
              description: Transfer session start time in microseconds since the server's epoch time.
              type: integer
              examples:
                - 1623863216321141===
            elapsed_usec:
              description: The duration of the transfer session, in microseconds.
              type: integer
              examples:
                - 321141
            bytes_transferred:
              description: The total number of bytes transferred in the session.
              type: integer
              examples:
                - 21
            bytes_written:
              description: The total number of bytes written in the session
              type: integer
              examples:
                - 21
            bytes_lost:
              description: The total number of bytes lost in the session
              type: integer
              examples:
                - 1408
            files_completed:
              description: The number of files that are transferred in the session.
              type: integer
              examples:
                - 1
            directories_completed:
              description: The number of directories that are transferred in the session.
              type: integer
              examples:
                - 0
            target_rate_kbps:
              description: The target transfer rate for the session.
              type: integer
              examples:
                - 10000
            min_rate_kbps:
              description: The minimum transfer rate for the session.
              type: integer
              examples:
                - 0
            calc_rate_kbps:
              description: The calculated transfer rate for the session.
              type: integer
              examples:
                - 1800
            network_delay_usec:
              description: The network delay in microseconds.
              type: integer
              examples:
                - 19000
            avg_rate_kbps:
              description: The average transfer rate for the session.
              type: number
              format: double
              examples:
                - 0.52
            error_code:
              description: The error code for any transfer session.
              type: integer
              examples:
                - 0
            error_desc:
              description: The error description for any transfer session.
              type: string
              examples:
                - ''
              maxLength: 255
              minLength: 1
            precalc:
              description: Precalc Transfer details
              type: object
              properties:
                enabled:
                  description: Specifies whether precalculation is enabled.
                  type: boolean
                  examples:
                    - true
                status:
                  description: The status of the precalculation job.
                  type: string
                  examples:
                    - ready
                  maxLength: 255
                  minLength: 1
                bytes_expected:
                  description: The number of bytes that will be transferred by the session
                  type: integer
                  examples:
                    - 21
                directories_expected:
                  description: The number of directories that will be transferred by the session.
                  type: integer
                  examples:
                    - 0
                files_expected:
                  description: The number of files that will be transferred by the session.
                  type: integer
                  examples:
                    - 1
                files_excluded:
                  description: The number of files that will be filtered from the source paths.
                  type: integer
                  examples:
                    - 0
                files_special:
                  description: The number of files that are not ordinary files, such as symbolic links.
                  type: integer
                  examples:
                    - 0
                files_failed:
                  description: The number of files that could not be pre-calculated.
                  type: integer
                  examples:
                    - 0
        bytes_transferred:
          description: The total number of bytes transferred across all sessions.
          type: integer
          examples:
            - 21
        bytes_written:
          description: The total number of bytes written across all sessions.
          type: integer
          examples:
            - 21
        bytes_lost:
          description: The total number of bytes lost across all sessions.
          type: integer
          examples:
            - 1408
        avg_rate_kbps:
          description: The average transfer rate across all sessions.
          type: number
          format: double
          examples:
            - 0.52
        files_completed:
          description: The number of files that are transferred across all sessions.
          type: integer
          examples:
            - 1
        directories_completed:
          description: The number of directories that are transferred across all sessions.
          type: integer
          examples:
            - 0
        start_time_usec:
          description: The start time of the transfer sessions, relative to the server's epoch.
          type: integer
          examples:
            - 1623863216000000===
        end_time_usec:
          description: The time when all transfer sessions complete, relative to the server's epoch.
          type: integer
          examples:
            - 1623863216321141===
        elapsed_usec:
          description: The total microseconds for all transfer sessions to complete.
          type: integer
          examples:
            - 321141
        precalc:
          description: Precalc Transfer details
          type: object
          properties:
            enabled:
              description: Specifies whether precalculation is enabled.
              type: boolean
              examples:
                - true
            status:
              description: The status of the precalculation job.
              type: string
              examples:
                - ready
              maxLength: 255
              minLength: 1
            bytes_expected:
              description: The number of bytes that will be transferred by the session
              type: integer
              examples:
                - 21
            directories_expected:
              description: The number of directories that will be transferred by the session.
              type: integer
              examples:
                - 0
            files_expected:
              description: The number of files that will be transferred by the session.
              type: integer
              examples:
                - 1
            files_excluded:
              description: The number of files that will be filtered from the source paths.
              type: integer
              examples:
                - 0
            files_special:
              description: The number of files that are not ordinary files, such as symbolic links.
              type: integer
              examples:
                - 0
            files_failed:
              description: The number of files that could not be pre-calculated.
              type: integer
              examples:
                - 0
        error_code:
          description: The error code for any transfer session.
          type: integer
          examples:
            - 0
        error_desc:
          description: The error description for any transfer session.
          type: string
          examples:
            - ''
          maxLength: 255
          minLength: 1
        files:
          description: File transfer statistics
          type: object
          properties:
            id:
              description: Unique ID of the file.
              type: string
              examples:
                - 299a-1bb61198-e3f1b099-aaf85450-ee918950
              maxLength: 255
              minLength: 1
            path:
              description: The file pathname.
              type: string
              examples:
                - /example_path- 8bceebd5-98fb-419a-896c-24155208e3ea.aspera-package/PKG - example_path/example_file.txt
              maxLength: 255
              minLength: 1
            start_time_usec:
              description: The time the file began transferring, in microseconds since the server's epoch.
              type: integer
              examples:
                - 1623863216000000===
            elapsed_usec:
              description: The transfer time for the file, in microseconds.
              type: integer
              examples:
                - 188773
            end_time_usec:
              description: The time the file stopped transferring, in microseconds.
              type: integer
              examples:
                - 1623863216009027===
            status:
              description: The transfer status for the file.
              type: string
              examples:
                - completed
              maxLength: 255
              minLength: 1
            error_code:
              description: The error code for the file transfer.
              type: integer
              examples:
                - 0
            error_desc:
              description: A description of the file transfer error. If no error, "No error".
              type: string
              examples:
                - ''
              maxLength: 255
              minLength: 1
            size:
              description: The size of the file, in bytes.
              type: integer
              examples:
                - 21
            type:
              description: The type of file, either "file" or "link" (for symbolic links).
              type: string
              examples:
                - file
              enum:
                - file
                - link
              maxLength: 255
              minLength: 1
            checksum_type:
              description: The type of checksum that is calculated for the file by the sender.
              type: string
              examples:
                - none
              maxLength: 255
              minLength: 1
            checksum:
              description: The checksum that is calculated for the file by the sender.
              type: string
              examples:
                - 'null'
              maxLength: 255
              minLength: 1
            start_byte:
              description: The first byte of the file that is transferred.
              type: integer
              examples:
                - 0
            bytes_written:
              description: The first byte of the file that is transferred.
              type: integer
              examples:
                - 21
            session_id:
              description: The ID of the session in which the file was transferred.
              type: integer
              examples:
                - 47eeb333-0aba-4837-a979-e5d8878cc25e
        iteration_token:
          description: Iteration token indicates the pages until the files data has been retrieved.
          type: string
          examples:
            - '2094'
          maxLength: 255
          minLength: 1
    GetUploadTransferSpec:
      description: The transfer specification.
      type: object
      properties:
        authentication:
          description: The type of authentication used to provide access to the remote node.
          type: string
          enum:
            - password
            - token
          maxLength: 255
          minLength: 1
        cipher:
          description: The algorithm used to encrypt data sent during a transfer. Use this option when transmitting sensitive data.
          type: string
          maxLength: 255
          minLength: 1
        cookie:
          description: The data to associate with the transfer. The cookie is reported to both client and server-side applications monitoring FASP transfers. It is often used by applications to identify associated transfers.
          type: string
          maxLength: 255
          minLength: 1
        create_dir:
          description: Creates the destination directory if it does not already exist. When enabling this option, the destination path is assumed to be a directory path.
          type: boolean
        destination_root:
          description: The transfer destination file path. If destinations are specified in paths, this value is prepended to each destination.
          type: string
          maxLength: 255
          minLength: 1
        direction:
          description: Specifies whether to perform an upload (send) or a download (receive).
          type: string
          enum:
            - send
            - receive
          maxLength: 255
          minLength: 1
        fasp_port:
          description: The UDP port for FASP to use. The default value works in most situations, but you may need to configure this port for firewall requirements.
          type: integer
        http_fallback:
          description: Specifies whether to attempt an HTTP transfer if the FASP transfer fails
          type: boolean
        http_fallback_port:
          description: The port the destination server is using to service HTTP transfers. Defaults to port 443 if a `cipher` is enabled, or port 80 otherwise.
          type: integer
        lock_min_rate:
          description: Specifies whether to prevent the user from changing the minimum rate during a transfer.
          type: boolean
        lock_rate_policy:
          description: Specifies whether to prevent the user from changing the rate policy during a transfer.
          type: boolean
        min_rate_kbps:
          description: The minimum speed of the transfer. FASP only shares bandwidth exceeding this value. This value has no effect if `rate_policy` is set to `fixed`.
          type: integer
        multi_session:
          description: The multi-session threshhold value, which specifies (in bytes) the smallest-size file that can be split. Files greater than or equal to the threshold are split, while those smaller than the threshold are not. If the multi-session threshold is 0, files are not split.
          type: integer
        paths:
          description: A list of the file and directory paths to transfer.
          type: array
          items:
            minLength: 1
            maxLength: 255
            type: string
          examples:
            - - /File1.jpg
              - /File2.png
        rate_policy:
          description: The rate policy for the transfer.
          type: string
          enum:
            - fixed
            - high
            - fair
            - low
          maxLength: 255
          minLength: 1
        rate_policy_allowed:
          description: The type of rate policy allowed for transfer.
          type: string
          maxLength: 255
          minLength: 1
        remote_host:
          description: The fully qualified domain name or IP address of the transfer server.
          type: string
          maxLength: 255
          minLength: 1
        remote_user:
          description: The Node API user to use for authentication.
          type: string
          maxLength: 255
          minLength: 1
        ssh_port:
          description: The SSH port for the transfer. FASP initiates transfers through SSH.
          type: integer
        tags:
          description: Tags for package, including metadata, package ID, requester details, and recipients.
          type: object
          properties: {}
        target_rate_cap_kbps:
          description: Limit the transfer rate that the user can adjust the target and minimum rates to.
          type: integer
        target_rate_kbps:
          description: The desired speed of the transfer. If there is competing network traffic, FASP may share this bandwidth, depending on the `rate_policy`.
          type: integer
        token:
          description: Used for token-based authorization, which involves the server-side application generating a token that gives the client rights to transfer a predetermined set of files.
          type: string
          maxLength: 255
          minLength: 1
    PostUploadTransferSpec:
      description: Files to transfer. Required for HTTP Gateway transfers.
      type: object
      properties:
        paths:
          description: A list of the file and directory paths to transfer.
          type: array
          items:
            minLength: 1
            maxLength: 255
            type: string
          examples:
            - - /File1.jpg
              - /File2.png
      required:
        - paths
