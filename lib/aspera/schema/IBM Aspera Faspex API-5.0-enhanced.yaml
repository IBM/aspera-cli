          schema:
            type: boolean
        - name: workgroup_ids
          in: query
          description: The comma-separated list of workgroup IDs.
          required: false
          schema:
            type: string
            maxLength: 255
            minLength: 1
          example: 1,2,3,4
        - name: shared_inbox_ids
          in: query
          description: The comma-separated list of shared inbox IDs.
          required: false
          schema:
            type: string
            maxLength: 255
            minLength: 1
          example: 1,2,3,4
        - name: status
          in: query
          description: The overall status of the package.
          required: false
          schema:
