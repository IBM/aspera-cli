        - name: limit
          in: query
          description: 'The maximum number of resources to return. **Note**: For file browsing APIs, HSTS will only return a maximum of 1000 records even if the request value is higher than 1000.'
          required: false
          schema:
            type: integer
        - name: type
          in: query
          description: The type of distribution lists to return. If no type is specified, all permitted distribution lists are returned.
          required: false
          schema:
            type: string
            enum:
              - global
              - personal
            maxLength: 255
            minLength: 1
      responses:
        '200':
          description: ' - OK - Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AllDistributionList'
        '400':
          description: ' - Bad request'
          content:
            application/json:
