  securitySchemes:
    OAuth2:
      type: oauth2
      description: |-
        This API uses OAuth 2 with the authorization code flow. The authorization flow can be generalized to these steps:
        1. Authorize to a registered OAuth 2 client (configured based on the authorization method) using the /authorize endpoint.
        2. You are redirected to the Faspex UI login page.
        3. Submit your credentials to retrieve an `authorization_code` on the submitted `redirect_uri`.
        4. Exchange the `authorization_code` for a JWT bearer token.
        5. Use the bearer token to authenticate your API requests by including it in your requests as a header with format: `Authorization: Bearer <bearer_token>`
      flows:
        authorizationCode:
          authorizationUrl: https://{host}{main_path}/auth/authorize
          tokenUrl: https://{host}{main_path}/auth/token
          scopes:
            user: Grant permissions to send and receive packages (sending permissions defined by admins).
            manager: Grant permissions to manage users, in addition to user permissions.
            admin: Grant permissions to adjust server configurations, manage managers and users, and access to all APIs, in addition to manager permissions.
            workgroup_admin: Grant permissions to manage workgroups assigned by an admin or workgroup admin.
            shared_inbox_admin: Grant permissions to manage shared inboxes assigned by an admin or shared inbox admin.
            client_only: Grant permissions to a restricted list of endpoints.
    PasscodeAuth:
      type: apiKey
      description: 'Include the API Key in your requests as a header with format: `Passcode: <passcode>`. Based on passcode value, passcode authentication will have restricted permissions.'
      in: header
      name: Passcode
    BasicAuth:
      type: http
      description: This API uses HTTP basic auth to authenticate the API request for OAuth clients that allows HTTP basic authentication.
      scheme: Basic
tags:
  - name: Accounts
  - name: Application Events
    description: An application event reflects user actions or system events that have been recorded.
  - name: Alternate addresses
  - name: Authorization
  - name: Contacts
  - name: Distribution lists
    description: A distribution list is a list of contacts that you can send packages to.
  - name: Email notifications
    description: Configure email notifications sent for different Faspex events.
  - name: File processing
  - name: Global user properties
    description: A user property is a custom field that stores additional metadata about a user. If required, an admin or self-registering user must provide a value for the field to create the user or register an account.
  - name: Health monitoring
  - name: Invitations
  - name: Metadata profiles
  - name: My account
    description: Get your account details, reset your password, and Update your account preferences and notification settings.
  - name: Nodes
    description: A node is a server running an IBM Aspera transfer product configured for use with Faspex. Faspex primarily uses nodes as storage for user-uploaded files and folders. Nodes can also be configured for use by permitted senders as a content source when sending a package. Faspex communicates to a node through the Node API. See the transfer product documentation for more information on how to configure a node for Faspex.
  - name: OAuth 2 clients
    description: |-
      Faspex supports OAuth 2 for a variety of flows. Use the:
      * WebOauthClient schema if your application is a web application
      * JwtOauthClient schema if your application does not use authenticated endpoints
      * PkceOauthClient schema if your application is a mobile application
  - name: Packages
    description: A package is a collection of files and folders with metadata. Users upload content to Faspex and Faspex makes it available as a package for recipients to download.
  - name: Passcode authentication
  - name: Rate limits
    description: Configure API server rate limits (enforced per IP address).
  - name: Registrations
    description: Moderate self-registration requests
  - name: Relays
    description: Relays transfer copies of uploaded files to specified destinations.
  - name: Remote transfers
    description: Send a package to a specified shared folder.
  - name: Reset passwords
    description: Administrators can reset passwords for all users or for a subset of users. Users with reset passwords need to create a new account password before logging in. You cannot reset the passwords of SAML, directory service, and external users.
  - name: SAML
    description: Faspex supports Security Assertion Markup Language (SAML) 2.0, an XML-based standard that allows secure web domains to exchange user authentication and authorization data. With the SAML model, you can configure Faspex as a SAML online service provider (SP) that contacts a separate online identity provider (IdP) to authenticate users.
  - name: SAML authorization
    description: Add a SAML configuration to Faspex to allow users to log in using SAML.
  - name: SAML groups
    description: A Faspex group that corresponds to a group in a SAML IdP.
  - name: SAML user properties
    description: Faspex can import SAML fields in your SAML identity provider (IdP) as user properties.
  - name: Server configuration
  - name: Shared folders
    description: Shared folders are also known as storage locations. Shared folders are directories on a node. You can use files and folders in shared folders as the source of content for a package.
  - name: Shared folders custom access
  - name: Shared inboxes
    description: A shared inbox provides a file submission system for users to share packages.
  - name: Shared inbox invitations
  - name: Shared inbox memberships
    description: Shared inbox members include Faspex users, SAML groups, and directory service groups.
  - name: Shared inbox packages
    description: Packages sent to a shared inbox are available to all members of the shared inbox.
  - name: Shared inbox relays
  - name: SMTP
    description: Connect Faspex to an SMTP server for Faspex to use to send emails.
  - name: Transfers
    description: Get information on active and inactive transfers.
  - name: Transfer specification
    description: Transfers require transfer specifications to determine transfer settings.
  - name: Version
  - name: Webhooks
  - name: Webhook events
  - name: Workgroups
    description: Workgroups define a group of users that can be sent packages as a collective whole. A Faspex administrator determines who has permissions to send packages to a workgroup and where those packages are stored. The administrator also determines whether members can see and send packages to other workgroup members.
  - name: Workgroup memberships
    description: Workgroup members include Faspex users, SAML groups, and directory service groups.
  - name: Workgroup packages
    description: Packages sent to a workgroup are available to all members of the workgroup.
  - name: Workgroup relays
