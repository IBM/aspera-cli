  /account/distribution_lists:
    get:
      operationId: getAllDistributionLists
      summary: Get all distribution lists
      description: Admins can see all distribution lists.
      parameters:
        - name: offset
          in: query
          description: The starting resource index for returning a collection of resources. Specify the offset to retrieve a subset of records starting with the offset value.
          required: false
