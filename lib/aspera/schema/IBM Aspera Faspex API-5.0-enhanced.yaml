          examples:
            - aes-128
          enum:
            - aes-128
            - aes-192
            - aes-256
            - aes-128-cfb
            - aes-192-cfb
            - aes-256-cfb
            - aes-128-gcm
            - aes-192-gcm
            - aes-256-gcm
          maxLength: 255
          minLength: 1
        public_url_allowed:
          description: Specifies whether public submissions links are enabled.
          type: boolean
        public_url_allowed_default:
          description: Specifies whether public submissions links are enabled by default.
          type: boolean
        connect_install_prompt:
          description: Specifies which users group is prompted to install Connect if connect is not installed.
          type: string
          default: all_users
          enum:
            - all_users
            - faspex_users
            - none
          maxLength: 255
          minLength: 1
        connect_url:
