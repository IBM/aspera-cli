  /contacts:
    get:
      operationId: getMyContacts
      summary: Get your contacts
      description: Retrieves an array of contacts plus other pagination information.
      parameters:
        - name: offset
          in: query
          description: The starting resource index for returning a collection of resources. Specify the offset to retrieve a subset of records starting with the offset value.
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          description: 'The maximum number of resources to return. **Note**: For file browsing APIs, HSTS will only return a maximum of 1000 records even if the request value is higher than 1000.'
          required: false
          schema:
            type: integer
        - name: type
          in: query
          description: Return user accounts and groups matching this type or types.
          required: false
          schema:
            description: Return user accounts and groups matching this type or types.
            type: array
            items:
              minLength: 1
              maxLength: 255
              type: string
              description: Contact type.
              enum:
                - workgroup
                - shared_inbox
                - distribution_list
                - user
                - external_user
            examples:
              - - user
                - workgroup
        - name: q
          in: query
          description: Searches through users, distribution lists, and shared inboxes for matching emails, usernames, names, and user profile data.
          required: false
          schema:
            type: string
            maxLength: 255
            minLength: 1
        - name: context
          in: query
          description: Returns user contacts based on a context.
          required: false
          schema:
            type: string
            const: packages
            maxLength: 255
            minLength: 1
      responses:
        '200':
          description: ' - OK - Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetContacts'
        '400':
          description: ' - Bad Request'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    description: Bad Request
                    type: string
                  code:
                    type: integer
                  message:
                    description: Bad Request
                    type: string
                  request_id:
                    description: A unique request ID that can be used to trace a request from end-to-end.
                    type: string
        '401':
          description: ' - Unauthorized'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncorrectCredentials'
        '500':
          description: ' - Internal Error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'
      security:
        - OAuth2:
            - user
            - manager
            - admin
      tags:
        - Contacts
    delete:
      operationId: deleteExternalContacts
      summary: Delete external user contacts
      description: Deletes external contacts that are accessible for the current user.
      parameters:
        - name: ids
          in: query
          description: The comma-separated list of resource IDs. You can specify up to 25 IDs.
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
          style: form
      responses:
        '204':
          description: ' - No Content - Successful response'
        '207':
          description: ' - Multi-status'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/207Responses'
        '401':
          description: ' - Unauthorized'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncorrectCredentials'
        '500':
          description: ' - Internal Error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'
      security:
        - OAuth2:
            - user
            - manager
            - admin
      tags:
        - Contacts
  /account/distribution_lists/{id}/contacts:
    delete:
      operationId: deleteContactsFromDistributionList
      summary: Delete contacts from a distribution list
      parameters:
        - name: id
          in: path
          description: The resource ID.
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
        - name: ids
          in: query
          description: The comma-separated list of usernames, workgroup or distribution list names, or external emails of contacts.
          required: false
          schema:
            type: string
            maxLength: 255
            minLength: 1
          example:
            - alice@xyz.com
            - bob@xyz.com
          explode: true
          style: form
      responses:
        '204':
          description: ' - No Content - Successful response'
        '400':
          description: ' - Bad request'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '401':
          description: ' - Unauthorized'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncorrectCredentials'
        '500':
          description: ' - Internal Error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'
      security:
        - OAuth2:
            - user
      tags:
        - Distribution lists
  /account/distribution_lists/{distribution_list_id}/contacts/{id}:
