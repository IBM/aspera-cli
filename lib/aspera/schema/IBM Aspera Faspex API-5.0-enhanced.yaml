                description: Specifies whether admins can invite and remove outside submitters.
                type: boolean
                default: true
              users_can_invite_external_submitters:
                description: Specifies whether regular users can invite outside submitters.
                type: boolean
              released_packages_count:
                description: Total number of available packages for the shared inbox.
                type: integer
              custom_package_expiration_policy:
                description: Specifies whether to enable the custom package expiration policy.
                type: boolean
              package_expiration_days:
                description: Days until packages expire. **Required when set_package_expiration is true**.
                type: integer
              set_package_expiration:
                description: Specifies whether packages expire after a period of days.
                type: boolean
              delete_package_after_download_policy:
                description: Deletion policy for packages after download.
                type: string
                default: nothing
                enum:
                  - nothing
                  - all_members
                  - any_member
                maxLength: 255
                minLength: 1
              custom_link_expiration_policy:
                description: Specifies whether to enable the custom invitation link expiration policy.
                type: boolean
              set_invitation_link_expiration:
                description: Specifies whether invitation links expire. **Required when custom_link_expiration_policy is true**.
                type: boolean
              slug:
                description: The slug of the shared inbox used for public invitation. **returned when allow_public_url is enabled**.
                type: string
                maxLength: 255
                minLength: 1
              invitation_expiration_days:
                description: 'Days until invitation links expire. **Required when *set_invitation_link_expiration* is true**. If you are specifying the *invitation_expiration_days* parameter, please do not include the *invitation_expiration_hours* parameter. You can only select one parameter at a time: either *invitation_expiration_days* or *invitation_expiration_hours*. **The *invitation_expiration_days* parameter will be replaced with *invitation_expiration_hours* in a future release. We will announce this update in the release notes once it is implemented.**'
                type: integer
                default: 3
              invitation_expiration_hours:
                description: 'Hours until invitation links expire. **Required when *set_invitation_link_expiration* is true**. If you are specifying the *invitation_expiration_hours* parameter, please do not include the *invitation_expiration_days* parameter. You can only select one parameter at a time: either *invitation_expiration_days* or *invitation_expiration_hours*.'
                type: integer
                default: 72
              invitation_expires_after_upload:
                description: Specifies whether invitation links expire after one successful upload.
                type: boolean
              require_encryption_at_rest:
                description: Specifies whether to require encryption-at-rest. **Permitted when server allows custom encryption at rest settings for shared inboxes**.
                type: string
                default: server
                enum:
                  - no
                  - optional
                  - yes
                  - server
                maxLength: 255
                minLength: 1
              latest_released_package:
                description: Time of the latest package sent to the shared inbox.
                type: string
                format: date-time
                maxLength: 255
                minLength: 1
              user_can_manage:
                description: Specifies whether user can manage this workgroup.
                type: boolean
