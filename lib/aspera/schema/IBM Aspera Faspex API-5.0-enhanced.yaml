          in: path
          description: Distribution list ID.
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
        - name: id
          in: path
          description: Username, workgroup or distribution list name, or external email of contact.
          required: true
          schema:
            type: string
            maxLength: 255
            minLength: 1
      responses:
        '204':
          description: ' - No Content - Successful response'
        '400':
