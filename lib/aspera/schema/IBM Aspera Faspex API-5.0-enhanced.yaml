          in: query
          description: General search string applied to the title, recipients, senders, and note of the packages.
          required: false
          schema:
            type: string
            maxLength: 255
            minLength: 1
        - name: created_time
          in: query
          description: 'Filter by created_time that matches the given criteria. Prefix Right-Hand-Side colon operator to a datetime value (ISO formatted) to denote the comparison. Supported operators are: "gte:" for greater than or equal (e.g. "created_time=gte:2021-08-21T17:03:48"),         "lte:" for less than or equal (e.g. "created_time=lte:2021-09-21T17:03:48"). To provide a date range, use comma-separated list of values as shown by example'
          required: false
          schema:
            type: string
            maxLength: 255
            minLength: 1
        - name: upload_completion_time
          in: query
          description: 'Filter by upload_completion_time that matches the given criteria. Prefix Right-Hand-Side colon operator to a datetime value (ISO formatted) to denote the comparison. Supported operators are: "gte:" for greater than or equal (e.g. "upload_completion_time=gte:2021-08-21T17:03:48"),         "lte:" for less than or equal (e.g. "upload_completion_time=lte:2021-09-21T17:03:48"). To provide a date range, use comma-separated list of values as shown by example'
          required: false
          schema:
            type: string
            maxLength: 255
            minLength: 1
        - name: changed_since_date
          in: query
          description: Return packages that changed since the given date (ISO formatted).
          required: false
          schema:
            type: string
            format: date
            maxLength: 255
            minLength: 1
        - name: upload_status
          in: query
          description: Filter by packages' upload_status.
          required: false
          schema:
            type: string
            enum:
              - completed
              - error
              - failed
              - paused
              - queued
              - stopped
              - submitted
              - timed_out
              - transferring
              - will_retry
              - pre_initiation
            maxLength: 255
            minLength: 1
        - name: release_policy
          in: query
          description: Filter by packages' release_policy.
          required: false
          schema:
            type: string
            enum:
              - now
              - on_date
              - later
            maxLength: 255
            minLength: 1
        - name: release_date_before
          in: query
          description: Return packages that are released before the given date (ISO formatted).
          required: false
          schema:
            type: string
            format: date
            maxLength: 255
            minLength: 1
        - name: ignore_deleted
          in: query
          description: Prevents returning packages that are in state 'deleted' or 'deleting'
