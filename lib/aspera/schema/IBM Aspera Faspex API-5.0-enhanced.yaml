          type:
            - string
            - 'null'
          maxLength: 255
          minLength: 1
        strong_password_regex:
          description: 'A regular expression that can be used to customize strong password requirements. Changing this setting does not affect existing passwords, but any new password must match this regular expression. Note: Update strong_password_requirements so your users understand the new password requirements.'
          type: string
          examples:
            - (?=.*[A-Z])(?=.*(\d|\W|_)).{7}
          maxLength: 255
          minLength: 1
        strong_password_requirements:
          description: An explanation of the strong password requirements defined by strong_password_regex.
          type: string
          examples:
            - Must be at least seven characters long, with at least one capital letter and one number or symbol.
          maxLength: 255
          minLength: 1
        save_metadata_in_package:
          description: When this option is set to true and the Save metadata to file option is enabled, the metadata file is included inside packages instead of being deposited in the packages root directories.
          type: boolean
        hide_relay_information:
          description: This setting hides relay information on the Package details page.
          type: boolean
        package_upload_timeout:
          description: The package upload timer starts when a user sends a new package. Even if queued, if a package does not start within the package upload timeout, Faspex marks the package as "Upload never started" and sends a failure notification to the Upload CC list. Increase this duration (in seconds) to account for transfers that may stay queued longer than the default duration.
          type: integer
          default: 3600
          maximum: 36000
        live_update_interval_sec:
