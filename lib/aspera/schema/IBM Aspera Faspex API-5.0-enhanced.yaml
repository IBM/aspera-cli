          type: integer
          default: 30
          maximum: 720
          minimum: 30
        pkg_processing_timeout_minutes:
          description: Specify how long faspex should wait for a response for file updates before the entire package times out (in minutes).
          type: integer
          default: 4320
          maximum: 10080
          minimum: 720
        initial_target_upload_rate_kbps:
          description: The default initial target upload rate for FASP transfers in Kbps.
          type: integer
          default: 10000
          maximum: 2000000000
          minimum: 0
        initial_target_download_rate_kbps:
          description: The default initial target download rate for FASP transfers in Kbps.
          type: integer
          default: 20000
          maximum: 2000000000
          minimum: 0
        max_target_upload_rate_kbps:
          description: The default max target upload rate for FASP transfers in Kbps.
          type: integer
          default: 20000
          maximum: 2000000000
          minimum: 0
        max_target_download_rate_kbps:
          description: The default max target download rate for FASP transfers in Kbps.
          type: integer
          default: 20000
          maximum: 2000000000
          minimum: 0
        http_fallback_enabled:
          description: Specifies whether HTTP fallback is enabled for transfers.
          type: boolean
          default: false
        lock_minrate_policy:
          description: Specifies whether the minrate policy is locked for FASP transfers.
          type: boolean
          default: true
        relay_outgoing_bandwidth_kbps:
          description: The outgoing relay bandwidth size.
          type: integer
          default: 45000
          maximum: 9999999
          minimum: 0
        relay_incoming_bandwidth_kbps:
          description: The incoming relay bandwidth size.
          type: integer
          default: 45000
          maximum: 9999999
          minimum: 0
        min_connect_version:
          description: The minimum release version for Connect.
          type: string
          examples:
            - 4.1.3
          maxLength: 255
          minLength: 1
        encrypt_transfers:
          description: Specifies whether transfers should be encrypted.
          type: boolean
          default: true
        lock_connect_sdk_version:
          description: Specifies whether the Connect SDK version is locked.
          type: boolean
        downloads_during_transfers_enabled:
          description: Specifies whether users can perform partial downloads of packages during transfers. Cannot be enabled when file_processing_enabled is true.
          type: boolean
          default: true
        http_gateway_url:
          description: The HTTP Gateway server URL.
          type:
            - string
            - 'null'
          examples:
            - https://http-gateway.example.com/aspera/http-gwy
          maxLength: 255
          minLength: 1
        prefer_http_connect:
          description: Specifies whether to prefer Connect over HTTP transfers.
          type: boolean
        encryption_type:
          description: The encryption cipher used for transfers.
          type:
            - string
