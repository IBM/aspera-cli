          type: array
          items:
            minLength: 1
            maxLength: 255
            type: string
        quota_sender_allowlist:
          description: Package senders with emails in these domains are not limited by the sender quota.
          type: array
          items:
            minLength: 1
            maxLength: 255
            type: string
        can_override_ear_per_personal_invite:
