    GetDownloadTransferSpec:
      description: The transfer specification.
      type: object
      properties:
        authentication:
          description: The type of authentication used to provide access to the remote node.
          type: string
          enum:
            - password
            - token
          maxLength: 255
          minLength: 1
        cipher:
          description: The algorithm used to encrypt data sent during a transfer. Use this option when transmitting sensitive data.
          type: string
          maxLength: 255
          minLength: 1
        cookie:
          description: The data to associate with the transfer. The cookie is reported to both client and server-side applications monitoring FASP transfers. It is often used by applications to identify associated transfers.
          type: string
          maxLength: 255
          minLength: 1
        direction:
          description: Specifies whether to perform an upload (send) or a download (receive).
          type: string
          enum:
            - send
            - receive
          maxLength: 255
          minLength: 1
        download_name:
          description: The name of the ZIP file created when downloading more than one file.
          type: string
          maxLength: 255
          minLength: 1
        fasp_port:
          description: The UDP port for FASP to use. The default value works in most situations, but you may need to configure this port for firewall requirements.
          type: integer
        http_fallback:
          description: Specifies whether to attempt an HTTP transfer if the FASP transfer fails
          type: boolean
        http_fallback_port:
          description: The port the destination server is using to service HTTP transfers. Defaults to port 443 if a `cipher` is enabled, or port 80 otherwise.
          type: integer
        lock_min_rate:
          description: Specifies whether to prevent the user from changing the minimum rate during a transfer.
          type: boolean
        lock_rate_policy:
          description: Specifies whether to prevent the user from changing the rate policy during a transfer.
          type: boolean
        min_rate_kbps:
          description: The minimum speed of the transfer. FASP only shares bandwidth exceeding this value. This value has no effect if `rate_policy` is set to `fixed`.
          type: integer
        multi_session:
          description: The multi-session threshhold value, which specifies (in bytes) the smallest-size file that can be split. Files greater than or equal to the threshold are split, while those smaller than the threshold are not. If the multi-session threshold is 0, files are not split.
          type: integer
        rate_policy:
          description: The rate policy for the transfer.
          type: string
          enum:
            - fixed
            - high
            - fair
            - low
          maxLength: 255
          minLength: 1
        rate_policy_allowed:
          description: The type of rate policy allowed for transfer.
          type: string
          maxLength: 255
          minLength: 1
        remote_host:
          description: The fully qualified domain name or IP address of the transfer server.
          type: string
          maxLength: 255
          minLength: 1
        remote_user:
          description: The Node API user to use for authentication.
          type: string
          maxLength: 255
          minLength: 1
        source_root:
          description: A path to prepend to the source paths specified in paths. If this is not specified, then paths should contain absolute paths.
          type: string
          maxLength: 255
          minLength: 1
        ssh_port:
          description: The SSH port for the transfer. FASP initiates transfers through SSH.
          type: integer
        tags:
          description: Tags for package, including metadata, package ID, requester details, and recipients.
          type: object
          properties: {}
        target_rate_cap_kbps:
          description: Limit the transfer rate that the user can adjust the target and minimum rates to.
          type: integer
        target_rate_kbps:
          description: The desired speed of the transfer. If there is competing network traffic, FASP may share this bandwidth, depending on the `rate_policy`.
          type: integer
        token:
          description: Used for token-based authorization, which involves the server-side application generating a token that gives the client rights to transfer a predetermined set of files.
          type: string
          maxLength: 255
          minLength: 1
        zip_required:
          description: Flag for HTTP Gateway to collect files into a ZIP, if necessary.
          type: boolean
    PostDownloadTransferSpec:
      description: Files to download. Required for HTTP Gateway transfers.
