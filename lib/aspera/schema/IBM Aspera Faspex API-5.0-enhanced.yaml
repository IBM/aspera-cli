    GetAdvancedConfiguration:
      description: Faspex server advanced configuration options.
      type: object
      properties:
        user_fields_in_tags:
          description: 'The user_fields_in_tags determines what fields Faspex includes in sender and recipients fields in Faspex-generated tags for the ascp command. When the keys of user profile fields provided here, they are then added to the package metadata along with sender/recipient specific keys and values. For ex: If sender/recipient has 10 user profile fields, only those keys out of 10 fields will be then passed to the metadata.'
          type: string
        disable_edit_email_html:
          description: When set to true, disables HTML editor option in email notifications. Administrators must use the form editor instead.
          type: boolean
        max_tags_length:
          description: 'The max_tags_length field limits the total length (after base64 encoding) of Faspex-generated tags for the ascp command. The value cannot exceed 4096 chars (bytes) due to a limitation in ascp. Note: If you set a value higher than 4096, Faspex sets the value to 1500.'
          type: integer
        enforce_self_registered_user_email_uniqueness:
          description: Prevent someone from self-registering an account with an email address used by a Faspex user (not including emails associated with an external user).
          type: boolean
        hide_sender_username_to_external_recipients:
          description: When external users download a package, the Connect logs and Connect manifests do not show the sender username.
          type: boolean
        exclude_metadata_from_cookie:
          description: This setting excludes metadata from Faspex cookies. It also relaxes the length requirements on metadata from 2,000 characters per profile to 30,000 characters.
          type: boolean
        saml_user_lookup_attribute:
          description: During SAML user login, this attribute value from SAML response is used to lookup the user.
          type: boolean
