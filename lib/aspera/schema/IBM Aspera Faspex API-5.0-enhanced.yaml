                description: Specifies whether this shared folder is the default inbox of the node.
                type: boolean
              enable_cloud_referencing:
                description: Specifies whether the shared folder is on a node using cloud object storage. Cloud referencing must be enabled on the node for it to be enabled on the shared folder.
                type: boolean
              enable_linking:
                description: Specifies whether symbolic links are enabled for the shared folder. Symbolic links must be enabled on the node to enable them for the shared folder.
                type: boolean
              kbps_initial_target_download_rate:
                description: The initial target download rate in Kbps for all FASP downloads. This parameter is required if override_transfer_parameters is set to true. This parameter cannot be included if override_transfer_parameters is false.
                type: integer
                default: 10000
              kbps_initial_target_upload_rate:
                description: The initial target upload rate in Kbps for all FASP uploads. This parameter is required if override_transfer_parameters is set to true. This parameter cannot be included if override_transfer_parameters is false.
                type: integer
                default: 10000
              kbps_max_target_download_rate:
                description: The max target download rate in Kbps for all FASP downloads. This parameter is required if override_transfer_parameters is set to true. This parameter cannot be included if override_transfer_parameters is false.
                type: integer
                default: 20000
              kbps_max_target_upload_rate:
                description: The max target upload rate in Kbps for all FASP uploads. This parameter is required if override_transfer_parameters is set to true. This parameter cannot be included if override_transfer_parameters is false.
                type: integer
                default: 20000
              lock_minrate_policy:
                description: Specifies whether a shared folder's transfers have a locked policy and rate. This parameter is required if override_transfer_parameters is set to true. This parameter cannot be included if override_transfer_parameters is false.
                type: boolean
                default: true
              override_transfer_parameters:
                description: Specifies whether to override the default transfer settings. If set to true, all the following parameters must also be specified. If set to false, you cannot include any of the following parameters.
                type: boolean
              relay_incoming_bandwidth:
                description: The bandwidth for incoming relays. This parameter is required if override_transfer_parameters is set to true. This parameter cannot be included if override_transfer_parameters is false.
                type: integer
                default: 45000
              relay_outgoing_bandwidth:
                description: The bandwidth for outgoing relays. This parameter is required if override_transfer_parameters is set to true. This parameter cannot be included if override_transfer_parameters is false.
                type: integer
                default: 45000
              read_permission:
                description: The level of access.
                type: string
                default: private
                enum:
                  - private
                  - public
                  - limited
                maxLength: 255
                minLength: 1
              is_custom_inbox:
                description: Specifies whether this shared folder is being used as a custom inbox by a shared inbox or workgroup
                type: boolean
