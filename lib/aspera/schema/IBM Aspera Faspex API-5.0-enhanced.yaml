    GetContacts:
      description: List of the user's contacts.
      type: object
      properties:
        total_count:
          description: The total number of contacts that exist for this user.
          type: integer
        offset:
          description: The index of the first resource in the results.If only one page, this will be 0. If paged result, this will be the index of the first resource.
          type: integer
          examples:
            - 20
        limit:
          description: 'The maximum number of resources to return. **Note**: For file browsing APIs, HSTS will only return a maximum of 1000 records even if the request value is higher than 1000.'
          type: integer
          examples:
            - 50
        contacts:
          description: List of contacts
          type: array
          items:
            type: object
            description: Contact details
            properties:
              email:
                description: Email ID of the user. Multiple users may have the same email.
                type: string
                examples:
                  - user1@ibm.com
                maxLength: 255
                minLength: 1
              id:
                description: ID of the contact.
                type: string
                maxLength: 255
                minLength: 1
              name:
                description: The username of user contact or name of workgroup or distribution list contact.
                type: string
                maxLength: 255
                minLength: 1
              first_name:
                description: Contact first name. Only available for the "User" types.
                type: string
                examples:
                  - Alex
                maxLength: 255
                minLength: 1
              last_name:
                description: Contact last name. Only available for the "User" types.
                type: string
                examples:
                  - Smith
                maxLength: 255
                minLength: 1
              type:
                description: Contact type.
                type: string
                enum:
                  - workgroup
                  - shared_inbox
                  - distribution_list
                  - user
                  - external_user
                maxLength: 255
                minLength: 1
              require_encryption_at_rest:
                description: Specifies whether to require encryption-at-rest. Only available for the "shared_inbox" types.
                type: string
                default: server
                enum:
                  - no
                  - optional
                  - yes
                  - server
                maxLength: 255
                minLength: 1
              metadata_profile_id:
                description: ID of the associated metadata profile. Only available for the "shared_inbox" types.
                type: string
                examples:
                  - '5'
                maxLength: 255
                minLength: 1
              submitters_instructions:
                description: User-defined description of the workgroup/shared_inbox. Only available for the "shared_inbox" and "workgroup" types.
                type: string
                maxLength: 255
                minLength: 1
