            - image/jpg
            - image/jpeg
            - image/png
            - undefined
            - ''
            - ''
          maxLength: 255
          minLength: 0
        app_logo_image_data:
          description: Data for the image to be used as header logo. The data must be binary and have a maximum size of 512KB.
          type: string
          maxLength: 255
          minLength: 0
        mfa_required:
          description: Specifies whether multi-factor authentication on public links is required.
          type: boolean
          default: false
        pkg_poller_start_delay:
          description: The time delay in seconds when pkg_poller jobs are started.
          type: integer
          default: 5
          maximum: 30
          minimum: 1
        retry_failed_pkgs_interval:
          description: Package poller retry interval in hours.
          type: integer
          default: 12
          maximum: 480
          minimum: 1
        enable_package_purge:
          description: When enabled, deleted packages older than X days will be purged automatically where X can be set using param days_before_deleting_package_records in configuration API.
          type: boolean
          default: false
        mfa_code_validity:
          description: Specifies the amount of time in minutes the multi-factor authentication code is valid for. Once expired, the user can request a new code.
          type: integer
          default: 10
          maximum: 30
          minimum: 1
        mfa_max_attempts:
