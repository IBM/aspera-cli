        - name: node_id
          in: query
          description: ID of the node
          required: true
          schema:
            type: string
          example: '3'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                transfers:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        description: Transfer ID which is the UUID of the transfer request.
                        type: integer
                      status:
                        description: Status of the transfer.
                        type: string
                      start_spec:
                        description: Transfer spec associated with the transfer request.
                        type: object
                      sessions:
                        description: List of sessions associated with the transfer, to be used to create/update e_sessions.
                        type: array
                        items:
                          type: string
                      bytes_transferred:
                        description: Total number of bytes transferred for the transfer.
                        type: integer
                      bytes_written:
                        description: Total number of bytes written for the transfer.
                        type: integer
                      bytes_lost:
                        description: Total number of bytes lost for the transfer.
                        type: integer
                      avg_rate_kbps:
                        description: Average transfer rate given in kbps.
                        type: integer
                      files_completed:
                        description: Total number of files with status completed for the transfer.
                        type: integer
                      directories_completed:
                        description: Total number of directories with status completed for the transfer.
                        type: integer
                      start_time_usec:
                        description: Start time for the transfer, reported in usec(time since epoch).
                        type: integer
                      end_time_usec:
                        description: End time for the transfer, reported in usec(time since epoch).
                        type: integer
                      elapsed_usec:
                        description: Total time for the transfer, reported in usec(time since epoch).
                        type: integer
                      precalc:
                        description: Pre-calculation details for the transfer.
                        type: object
                      error_code:
                        description: Error code, if any, for with the transfer.
                        type: string
                      error_desc:
                        description: Error description details, if any, for the transfer.
                        type: string
      responses:
        '200':
          description: ' - OK - Successful response'
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    description: Status message of the request
                    type: string
        '400':
          description: ' - Bad Request'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidId'
        '401':
          description: ' - Unauthorized Error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncorrectCredentials'
        '404':
          description: ' - Not Found'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFound'
        '500':
          description: ' - Internal Error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'
      tags:
        - Transfers
  /internal/accounts:
    delete:
      operationId: deleteUserAccountsOnCondition
      summary: Delete user accounts based on the condition
      description: INTERNAL ONLY - Delete user accounts based on the condition and delete expired access token.
      parameters:
        - name: condition
          in: query
          description: The user account condition that determines what accounts to delete.
          required: true
          schema:
            type: string
            enum:
              - inactive
              - self_destruct
            maxLength: 255
            minLength: 1
      responses:
        '200':
          description: ' - OK - Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteBulkTaskResponse'
        '400':
          description: ' - Bad request'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadRequest'
        '401':
          description: ' - Unauthorized'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncorrectCredentials'
      security:
        - BearerToken: []
      tags:
        - Accounts (Internal)
  /accounts/deactivate:
    post:
      operationId: deactivateExpiredUserAccounts
      summary: Deactivate expired user accounts
      description: INTERNAL ONLY
      parameters:
        - name: expired
          in: query
          description: Specifies whether the deactivate expired users.
          required: true
          schema:
            type: boolean
      responses:
        '200':
          description: ' - OK - Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostBulkTaskResponse'
        '401':
          description: ' - Unauthorized'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncorrectCredentials'
      security:
        - OAuth2:
            - admin
            - manager
      tags:
        - Accounts (Internal)
  /jobs/next_available_job:
    post:
      operationId: updateAndRetrieveNextJob
      summary: Update and retrieve the next available job
      description: INTERNAL ONLY. Used by Faspex Services. Retrieves the next available job for processing and update the status of the current job to `working`.
      responses:
        '200':
          description: ' - OK - Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PostJob'
        '204':
          description: ' - No Content'
        '400':
          description: ' - Bad Request'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvalidMailboxParam'
        '401':
          description: ' - Unauthorized'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncorrectCredentials'
        '500':
          description: ' - Internal Error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'
      tags:
        - Jobs (Internal)
  /internal/jobs/purge:
    post:
      operationId: purgeJobQueues
      summary: Purge expired MFA codes
      description: Expired MFA codes will be purged.
      responses:
        '200':
          description: ' - OK - Successful response'
          content:
            application/json:
              schema:
                type: object
                properties:
                  mfa_codes_purged:
                    description: Count of MFA codes purged.
                    type: integer
        '401':
          description: ' - Unauthorized'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncorrectCredentials'
        '500':
          description: ' - Internal Error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'
      security:
        - BearerToken: []
      tags:
        - Jobs (Internal)
