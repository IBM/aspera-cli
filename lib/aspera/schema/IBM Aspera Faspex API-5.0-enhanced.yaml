      responses:
        '200':
          description: ' - OK - Successful response'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetBranding'
        '400':
          description: ' - Bad Request'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ParameterNotPermitted'
        '401':
          description: ' - Unauthorized'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IncorrectCredentials'
        '500':
          description: ' - Internal Error'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InternalError'
      security:
        - OAuth2:
            - admin
      tags:
