  securitySchemes:
    OAuth2:
      type: oauth2
      description: |
        OAuth 2.0 authentication for Aspera on Cloud API.

        The API supports multiple OAuth 2.0 flows:
        - Authorization Code flow for web applications
        - Client Credentials flow for server-to-server communication
        - JWT Bearer flow for service accounts

        Register your client application via the `/clients` endpoint to obtain client credentials.
        Configure authorized users and groups via the `/client_authorizations` endpoint.
      flows:
        authorizationCode:
          authorizationUrl: https://api.ibmaspera.com/oauth2/authorize
          tokenUrl: https://api.ibmaspera.com/oauth2/token
          scopes:
            user: Access user resources
            admin: Administrative access
        clientCredentials:
          tokenUrl: https://api.ibmaspera.com/oauth2/token
          scopes:
            user: Access user resources
            admin: Administrative access
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        JWT Bearer token authentication.

        Include the access token obtained from the OAuth 2.0 flow in the Authorization header:
        ```
        Authorization: Bearer <access_token>
        ```

        For JWT-based authentication, the token must be signed with either:
        - User-specific private key (user's public key must be registered in AoC)
        - Global private key (configured in client settings)
security:
  - OAuth2: []
  - BearerAuth: []
x-ibm-configuration:
  enforced: false
  testable: true
  phase: realized
  cors:
    enabled: true
