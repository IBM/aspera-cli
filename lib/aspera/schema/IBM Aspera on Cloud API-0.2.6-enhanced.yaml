        explicit_authorization_required:
          description: Use with browser-based authorization. When users log in using the client app via a browser, prompt them to explicitly allow access to AoC features. Admin permissions required. Defaults to true.
          type: boolean
          examples:
            - true
        jwt_grant_enabled:
          description: >-
            Allow the client to authenticate using the JSON web token method.
            The JWT grant allows the users of the client to log in without
            having to use a web browser. Admin permissions required.
          type: boolean
          examples:
            - false
        name:
          description: 'The name of the client app to register. Admin permissions required. POST: required. PUT: not required.'
          type: string
          examples:
            - AoC_Client
        origins:
          description: 'The allowable list of origins for the client. An origin is the URI or protocol-host-port of the client app initial login page, from which the user must arrive to the authentication flow. Array of JSON origins (strings) Admin permissions required. Separate multiple origins with commas. Maximum characters: 65535.'
          type: array
          items:
            type: string
          examples:
            - - https://ClientOrigin.com
        public_key:
          description: 'RSA public key in PEM format. The corresponding private key can be used to generate a JWT assertion for any user in the organization. Admin permissions required. Maximum characters: 65535.'
          type: string
          examples:
            - |-
              -----BEGIN PUBLIC KEY-----
              MIIBI ... 7QIDAQAB
              -----END PUBLIC KEY-----
        redirect_uris:
          description: 'The allowable list of redirect URIs for the client. A redirect URI (protocol-host-port) is an absolute URI invoked after the authentication flow to return the user to the client app. Array of JSON redirect URIs (strings) Admin permissions required. Separate multiple redirect URIs with commas. Maximum characters: 65535.'
          type: array
          items:
            type: string
          examples:
            - - https://ClientRedirect.com
        whitelist_enabled:
          description: Enable creation of a specific list of users and groups eligible to receive an access token. To create the whitelist, see /client_authorizations. Admin permissions required. Pertains to JWT grants. Default is false.
          type: boolean
          examples:
            - true
      required:
        - name
