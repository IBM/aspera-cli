        public_key:
          description: 'The public portion of the RSA key pair. Maximum characters: 65535.'
          type: string
          examples:
            - |-
              -----BEGIN PUBLIC KEY-----
              MIIBI ... 7QIDAQAB
              -----END PUBLIC KEY-----
        redirect_uris:
