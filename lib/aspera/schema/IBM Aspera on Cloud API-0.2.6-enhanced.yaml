paths:
  /oauth2/authorize:
    get:
      operationId: oauth2_authorize
      summary: OAuth 2.0 Authorization Endpoint
      description: |
        Initiate the OAuth 2.0 authorization code flow.
        
        This endpoint presents the user with a login page (if not already authenticated) and an authorization consent screen.
        After the user grants permission, they are redirected back to the client application with an authorization code.
        
        The authorization code can then be exchanged for an access token at the `/oauth2/token` endpoint.
      tags:
        - Clients
      security: []
      parameters:
        - name: response_type
          in: query
          required: true
          description: Must be "code" for authorization code flow
          schema:
            type: string
            enum:
              - code
          example: code
        - name: client_id
          in: query
          required: true
          description: The client identifier registered with the authorization server
          schema:
            type: string
          example: my_client_app
        - name: redirect_uri
          in: query
          required: true
          description: URI where the user will be redirected after authorization
          schema:
            type: string
            format: uri
          example: https://example.com/callback
        - name: scope
          in: query
          required: false
          description: Space-separated list of requested scopes
          schema:
            type: string
          example: user:all
        - name: state
          in: query
          required: false
          description: Opaque value used to maintain state between request and callback (recommended for CSRF protection)
          schema:
            type: string
          example: random_state_string_123
      responses:
        '302':
          description: Redirect to login page or client redirect_uri
          headers:
            Location:
              description: Redirect URL with authorization code or error
              schema:
                type: string
                format: uri
              examples:
                success:
                  summary: Successful Authorization
                  value: https://example.com/callback?code=abc123def456&state=random_state_string_123
                error:
                  summary: Authorization Error
                  value: https://example.com/callback?error=access_denied&error_description=User+denied+access&state=random_state_string_123
        '400':
          description: Bad Request - Invalid authorization request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuth2TokenError'
              examples:
                invalid_request:
                  summary: Invalid Request
                  value:
                    error: invalid_request
                    error_description: missing required parameter
                    state: null
                invalid_client:
                  summary: Invalid Client
                  value:
                    error: invalid_client
                    error_description: client not found
                    state: null
                unauthorized_client:
                  summary: Unauthorized Client
                  value:
                    error: unauthorized_client
                    error_description: client not authorized for this grant type
                    state: null
                invalid_scope:
                  summary: Invalid Scope
                  value:
                    error: invalid_scope
                    error_description: requested scope is invalid
                    state: null
  /oauth2/revoke:
    post:
      operationId: oauth2_revoke
      summary: OAuth 2.0 Token Revocation Endpoint
      description: |
        Revoke an access token or refresh token.
        
        This endpoint allows clients to notify the authorization server that a previously obtained
        token is no longer needed. This can be used to revoke both access tokens and refresh tokens.
        
        The client must authenticate using HTTP Basic authentication with client credentials.
      tags:
        - Clients
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                token:
                  type: string
                  description: The token to be revoked (access token or refresh token)
                  example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                token_type_hint:
                  type: string
                  description: Hint about the type of token being revoked
                  enum:
                    - access_token
                    - refresh_token
                  example: access_token
              required:
                - token
      responses:
        '200':
          description: Token successfully revoked or token was already invalid
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        '400':
          description: Bad Request - Invalid revocation request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuth2TokenError'
              examples:
                missing_token:
                  summary: Missing Token Parameter
                  value:
                    error: invalid_request
                    error_description: missing 'token'
                    state: null
        '401':
          description: Unauthorized - Invalid client credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuth2TokenError'
              examples:
                invalid_client:
                  summary: Invalid Client Credentials
                  value:
                    error: invalid_client
                    error_description: invalid client id or secret
                    state: null
  /oauth2/token:
    post:
      operationId: oauth2_token
      summary: OAuth 2.0 Token Endpoint
      description: |
        Request an access token using various OAuth 2.0 grant types.
        
        This endpoint supports multiple authentication flows:
        - **Authorization Code**: Exchange an authorization code for tokens
        - **Refresh Token**: Obtain a new access token using a refresh token
        - **JWT Bearer**: Authenticate using a signed JWT assertion
        - **URL Token**: Exchange a URL token for an access token
        
        The response includes an access token and optionally a refresh token depending on the grant type.
      tags:
        - Clients
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                grant_type:
                  type: string
                  description: The OAuth 2.0 grant type
                  enum:
                    - authorization_code
                    - refresh_token
                    - urn:ietf:params:oauth:grant-type:jwt-bearer
                    - url_token
                  example: authorization_code
                code:
                  type: string
                  description: Authorization code (required for authorization_code grant)
                  example: abc123def456
                redirect_uri:
                  type: string
                  format: uri
                  description: Redirect URI (required for authorization_code grant, must match the one used in authorization request)
                  example: https://example.com/callback
                refresh_token:
                  type: string
                  description: Refresh token (required for refresh_token grant)
                  example: refresh_abc123
                assertion:
                  type: string
                  description: JWT assertion (required for jwt-bearer grant)
                  example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                url_token:
                  type: string
                  description: URL token identifier (required for url_token grant)
                  example: token_abc123
                password:
                  type: string
                  description: Password for password-protected URL tokens (optional, required only if URL token is password-protected)
                  example: secret123
                scope:
                  type: string
                  description: Requested scope (optional)
                  example: user:all
              required:
                - grant_type
            examples:
              authorization_code:
                summary: Authorization Code Grant
                value:
                  grant_type: authorization_code
                  code: abc123def456
                  redirect_uri: https://example.com/callback
              refresh_token:
                summary: Refresh Token Grant
                value:
                  grant_type: refresh_token
                  refresh_token: refresh_abc123
              jwt_bearer:
                summary: JWT Bearer Grant
                value:
                  grant_type: urn:ietf:params:oauth:grant-type:jwt-bearer
                  assertion: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
              url_token:
                summary: URL Token Grant
                value:
                  grant_type: url_token
                  url_token: token_abc123
              url_token_with_password:
                summary: URL Token Grant (Password Protected)
                value:
                  grant_type: url_token
                  url_token: token_abc123
                  password: secret123
      responses:
        '200':
          description: Successfully obtained access token
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                    description: The access token for API authentication
                    example: eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
                  token_type:
                    type: string
                    description: Token type (always "Bearer")
                    example: Bearer
                  expires_in:
                    type: integer
                    description: Token lifetime in seconds
                    example: 3600
                  refresh_token:
                    type: string
                    description: Refresh token (only for certain grant types)
                    example: refresh_abc123
                  scope:
                    type: string
                    description: Granted scope
                    example: user:all
                required:
                  - access_token
                  - token_type
        '400':
          description: Bad Request - Invalid OAuth 2.0 request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuth2TokenError'
              examples:
                invalid_grant_url_token:
                  summary: Invalid URL Token
                  value:
                    error: invalid_grant
                    error_description: invalid URL token
                    state: null
                invalid_grant_auth_code:
                  summary: Invalid Authorization Code
                  value:
                    error: invalid_grant
                    error_description: invalid authorization code
                    state: null
                invalid_grant_refresh_token:
                  summary: Invalid Refresh Token
                  value:
                    error: invalid_grant
                    error_description: invalid refresh token
                    state: null
                authorization_code_reused:
                  summary: Authorization Code Already Used
                  value:
                    error: invalid_grant
                    error_description: authorization code already used
                    state: null
                redirect_uri_mismatch:
                  summary: Redirect URI Mismatch
                  value:
                    error: invalid_grant
                    error_description: redirect uri doesn't match authorized redirect uri
                    state: null
                access_denied_expired:
                  summary: Link Expired
                  value:
                    error: access_denied
                    error_description: link is expired
                    state: null
                access_denied_password:
                  summary: Invalid Password
                  value:
                    error: access_denied
                    error_description: invalid password for url_token
                    state: null
                invalid_request_missing_grant:
                  summary: Missing Grant Type
                  value:
                    error: invalid_request
                    error_description: missing 'grant_type'
                    state: null
                invalid_request_missing_code:
                  summary: Missing Authorization Code
                  value:
                    error: invalid_request
                    error_description: missing 'code'
                    state: null
                invalid_request_missing_url_token:
                  summary: Missing URL Token
                  value:
                    error: invalid_request
                    error_description: missing 'url_token'
                    state: null
                invalid_request_missing_password:
                  summary: Missing Password for URL Token
                  value:
                    error: invalid_request
                    error_description: missing password for url_token
                    state: null
                unsupported_grant_type:
                  summary: Unsupported Grant Type
                  value:
                    error: unsupported_grant_type
                    error_description: grant type not supported
                    state: null
        '401':
          description: Unauthorized - Invalid client credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OAuth2TokenError'
              examples:
                invalid_client:
                  summary: Invalid Client Credentials
                  value:
                    error: invalid_client
                    error_description: invalid client id or secret
                    state: null
  /apps/app_memberships:
    get:
      operationId: get_app_memberships
      summary: Get a Listing of App Memberships
      description: |
        Get a listing of app memberships. For organization admins, all app memberships for the entire organization are available to view. For all other users, your own app memberships are available.
      parameters:
        - name: aspera_app_type
          in: query
          description: Can be "activity" or "automation".
          schema:
            type: string
        - name: created_at
          in: query
          schema:
            type: string
            format: date-time
        - name: inherited
          in: query
          description: |
            Set to false if you want to filter out inherited memberships.
          schema:
            type: boolean
        - name: last_login_at
          in: query
          schema:
            type: string
            format: date-time
        - name: member.email
          in: query
          description: For member_type=user.
          schema:
            type: string
        - name: member.name
          in: query
          description: For member_type=user.
          schema:
            type: string
        - name: member_type
          in: query
          description: Can be "user" or "group".
          schema:
            type: string
        - name: q
          in: query
          description: Searches member.email and member.name.
          schema:
            type: string
        - name: sort
          in: query
          description: Specify a field for sorting results.
          schema:
            type: string
        - name: updated_at
          in: query
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/app_memberships_response'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '500':
          description: Internal Server Error
      tags:
        - App Memberships
  /apps/app_memberships/{id}:
    delete:
      operationId: delete_app_membership
      summary: Delete a Specific App Membership
      description: |
        Delete an app membership, specified by membership ID. Requires organization admin permission.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '500':
          description: Internal Server Error
      tags:
        - App Memberships
    get:
      operationId: get_app_membership_by_id
      summary: Get Information About a Specific App Membership
      description: |
        Get information about a specific app membership, specified by membership ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app_memberships_response'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '500':
          description: Internal Server Error
      tags:
        - App Memberships
  /apps/{aspera_app_type}/app_memberships:
    post:
      operationId: add_app_membership
      summary: Create a New App Membership
      description: |
        Create an app membership. Requires organization admin permission.
      parameters:
        - name: aspera_app_type
          in: path
          required: true
          schema:
            type: string
            enum:
              - activity
              - automation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/app_memberships_params'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/app_memberships_response'
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '409':
          description: Conflict
        '422':
          description: Unprocessable Entity
        '500':
          description: Internal Server Error
      tags:
        - App Memberships
