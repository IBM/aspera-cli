openapi: 3.1.0
info:
  title: Aspera on Cloud and Aspera Enterprise Web Apps
  description: |
    API for Aspera on Cloud and Aspera Enterprise Web Apps

    ## API Endpoints Structure

    This API is available through multiple base paths:

    - **OAuth endpoints**: Available at both `/oauth2/...` and `/api/v1/oauth2/...`
    - **Resource endpoints**: Available at `/api/v1/...` (workspaces, packages, users, etc.)
    - **Legacy endpoints**: Some endpoints available without `/api/v1` prefix

    Most API operations require the `/api/v1` prefix. OAuth authentication endpoints support both paths for backward compatibility.

    ## Authentication

    This API uses OAuth 2.0 for authentication. You must obtain an access token before making API requests.

    ### OAuth 2.0 Flow

    The API supports the following OAuth 2.0 grant types:

    - **Authorization Code**: For web applications with user interaction
    - **Client Credentials**: For server-to-server authentication
    - **JWT Bearer**: For service accounts using signed JWT tokens
    - **URL Token**: For temporary access via URL-based tokens

    ### Getting an Access Token

    1. Register your client application using the `/api/v1/clients` endpoint
    2. Configure authentication method (browser-based or JWT)
    3. Obtain an access token from `/oauth2/{subdomain}/token` or `/api/v1/oauth2/{subdomain}/token`
    4. Include the token in the `Authorization` header: `Bearer <access_token>`

    ### Token Usage

    All API requests must include a valid OAuth 2.0 access token in the Authorization header:

    ```
    Authorization: Bearer eyJhbGciOiJSUzI1NiIsInR5cCI6IkpXVCJ9...
    ```

    ### JWT Authentication

    For JWT-based authentication:
    - Configure your client via `/api/v1/clients` endpoint
    - Set up authorized users/groups via `/api/v1/client_authorizations`
    - Sign JWT with user-specific or global private key
    - Users must have their public key registered in their AoC profile

    See `/clients` and `/client_authorizations` endpoints for detailed configuration.
