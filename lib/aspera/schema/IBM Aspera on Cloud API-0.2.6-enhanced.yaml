    user_interaction_preferences_params:
      type: object
      description: |
        User interaction preferences for customizing the UI experience. This object accepts arbitrary key-value pairs
        to allow for flexible frontend preferences storage. All fields are optional and can be extended as needed.
      properties:
        autofill_shared_inbox_sending:
          description: Whether to automatically fill the shared inbox when sending packages
          type: boolean
          nullable: true
          example: true
        default_aoc_app:
          description: The default Aspera on Cloud application to display on login (e.g., "packages", "files", "activity")
          type: string
          nullable: true
          example: packages
