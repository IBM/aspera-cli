    clients_params:
      type: object
      properties:
        admin_node_token_retrieval_enabled:
          description: If you use the JWT grant type (jwt_grant_enabled=true), whether or not to allow users of this client who are AoC administrators to retrieve admin-scoped node access tokens. Such a token provides the user with admin privileges on the node itself. Admin permissions required. Defaults to false.
          type: boolean
          examples:
