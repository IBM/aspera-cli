          description: The user's preferred language for the UI (e.g., "en-us", "fr-fr", "de-de")
          type: string
          nullable: true
          example: en-us
        first_connect_transfer:
          description: Whether this is the user's first time connecting for a transfer (used for onboarding)
          type: boolean
          nullable: true
          example: true
        first_connect_download:
          description: Whether this is the user's first time connecting for a download (used for onboarding)
          type: boolean
          nullable: true
          example: true
        pinned_dropbox_ids:
          description: Array of dropbox IDs that the user has pinned for quick access
          type: array
          nullable: true
          items:
            type: integer
          example: [1, 2, 3]
        pinned_workspace_ids:
          description: Array of workspace IDs that the user has pinned for quick access
          type: array
          nullable: true
          items:
            type: integer
          example: [10, 20]
        auto_workflow_view:
          description: The default view mode for automation workflows
          type: string
          nullable: true
          example: ""
        grid_view_workspaces:
          description: The view mode for workspaces display (e.g., "list", "grid")
          type: string
          nullable: true
          example: list
        last_read_coming_soon:
          description: Timestamp of the last time the user viewed the "Coming Soon" announcements
          type: string
          nullable: true
          example: "03/19/2021_1"
        last_read_whats_new:
          description: Timestamp of the last time the user viewed the "What's New" announcements
          type: string
          nullable: true
          example: "03/30/2021_1"
        recent_transfers:
          description: Object storing information about recent transfers for quick access
          type: object
          nullable: true
          additionalProperties: true
          example: {}
        help_recent:
          description: Array of recently accessed help topics for quick reference
          type: array
          nullable: true
          items:
            type: string
          example: ["subscription_management", "creating_a_new_workspace"]
        tableDataStore:
          description: JSON string containing table configuration and sizing preferences for various UI tables
          type: string
          nullable: true
          example: '[{"id":"files-table"},{"id":"user-list","tableSizing":"{\"displayUserStatus\":198}"}]'
      additionalProperties: true
      example:
        autofill_shared_inbox_sending: true
        default_aoc_app: packages
        default_language: en-us
        pinned_workspace_ids: [10, 20]
        grid_view_workspaces: list
