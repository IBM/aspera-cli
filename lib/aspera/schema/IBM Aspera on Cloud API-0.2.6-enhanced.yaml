    packages_params:
      type: object
      properties:
        archived:
          description: Whether or not this package has been archived by the user.
          type: boolean
          examples:
            - false
        bcc_recipients:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/senders_recipients_object'
        content_retention_duration:
          description: When a time-based content expiration value is set for this package, the duration to retain packages contents. When this duration passes, the packages contents are deleted. Valid values are null to 10 years. Units are seconds.
          type: integer
          examples:
            - 2592000
        delete_package_content_after_download_duration:
          description: If 'delete_after_download' is set to 'true', this parameter configures an optional 'grace period', during which the package contents will be retained even after all recipients have downloaded the package. The timer for this setting begins when all recipients have downloaded the package; when the timer expires, the package contents are deleted. Valid values are null - 10 years.  Units are seconds.
          type: integer
          examples:
            - 604800
        download_notification_recipients:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/senders_recipients_object'
        draft:
          description: Whether or not the package is in draft status.
          type: boolean
          examples:
            - true
        encryption_at_rest:
          description: Whether or not the package has encryption_at_rest applied. For transfers that use the Aspera Connect transfer client, note this requirement to enable Connect to decrypt package contents. When a package is uploaded with encryption-at-rest set to true, the parameter single-source must also be true.
          type: boolean
          examples:
            - false
        file_names:
          description: 'The names of the items to include in this package; multiple names separated by commas. Maximum characters: 65535'
          type: string
          examples:
            - file.txt, file2.txt
        metadata:
          description: 'JSON object. Maximum characters: 65535'
          type: object
          examples:
            - project: migration
              priority: high
        name:
          description: Package name. Required for POST. Optional for PUT.
          type: string
          examples:
            - Name of Package
        note:
          description: "The sender's message to recipients to include with the package. Maximum characters: 65535."
          type: string
          examples:
            - Please review and process asap.
        read:
          description: Whether or not the package was read.
          type: boolean
          examples:
            - false
        recipients:
          type: array
          nullable: false
          items:
            $ref: '#/components/schemas/senders_recipients_object'
        sent:
          description: Whether or not the package was sent.
          type: boolean
          examples:
            - false
        single_source:
          description: Whether or not all the contents of this package originate from the same location (node, workstation, etc.). When the package recipient downloads a package with Encryption at Rest (EAR) applied by the sender, and all package contents are from the same source (single-source=true; for example, the sender's desktop; a specific remote server), AoC signals Aspera Connect to prompt the recipient to apply the passphrase created by the sender and decrypt package contents during the download operation. When package contents are from disparate sources, the recipient applies the password to individual files in the downloaded package when opening each file.
          type: boolean
          examples:
            - false
        transfers_expected:
          description: The number of transfer sessions expected to bring all package contents to the node supporting the workspace in which the package is sent. The number corresponds to the number of discrete source locations of the designated package contents. For example, if the package includes 20 files and folders from 5 discrete sources, the number of transfers expected is 5.
          type: integer
          examples:
            - 3
        upload_notification_recipients:
          type: array
          nullable: false
          items:
            $ref: '#/components/schemas/senders_recipients_object'
        workspace_id:
          description: The ID of the workspace from which this package was sent. Required for POST. Optional for PUT.
          type: integer
          examples:
            - 65
      required:
        - name
        - workspace_id
