          in: query
          description: |
            Filters memberships with member_type = "user" by their "deactivated" attribute.
          schema:
            type: boolean
        - name: dropbox_id
          in: query
          schema:
            type: string
        - name: embed%5B%5D
          in: query
          description: |
            embed%5B%5D=member (user or group object from member_id), embed%5B%5D=dropbox (dropbox object from dropbox_id)
          schema:
            type: string
        - name: inherited
          in: query
          description: |
            Specifies whether or not to include inherited memberships in the response. Typically used when an admin is looking at the memberships for a particular member_id or when a user is looking at their own memberships.
          schema:
            type: boolean
        - name: manager
          in: query
          schema:
            type: boolean
        - name: member.email
          in: query
          schema:
            type: string
        - name: member.last_login_at
          in: query
          schema:
            type: string
            format: date-time
        - name: member.last_name
          in: query
          schema:
            type: string
        - name: member.system_group
          in: query
          schema:
            type: boolean
        - name: member_id
          in: query
          schema:
            type: string
        - name: member_type
          in: query
          description: Either "user" or "group"
          schema:
            type: string
        - name: q
          in: query
          description: |
            Search member.email, member.first_name, member.last_name, and member.name.
          schema:
            type: string
        - name: updated_at
          in: query
          schema:
            type: string
            format: date-time
      responses:
