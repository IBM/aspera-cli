            - iVBORw0KGgo ... /wB\/DRk84ZdwGQAAAABJRU5ErkJggg==
        image_type:
          description: The image type of the workspace logo; for example, image/png or image/jpg. POST Admin permission required. PUT Manager permission required or PUT Admin permission required. RESPONSE User scope. RESPONSE Admin scope (could be ws manager). RESPONSE Admin scope (org admin).
          type: string
          examples:
            - image/png
        inherit_email_notification_settings:
          description: Inherit the email notification settings configured at the organization. If set to false, you can configure external email notification settings for this workspace; see 'enable_external_notifications'. POST Admin permission required. PUT Admin permission required. RESPONSE Admin scope (org admin).
          type: boolean
