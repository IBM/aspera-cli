  /apps/{aspera_app_type}/settings:
    get:
      operationId: get_app_settings_by_type
      summary: Get Application Settings by Type
      description: |
        Retrieve organization-level settings for a specific application type.

        The response structure varies based on the `aspera_app_type` parameter:
        - **files**: Returns settings specific to the Files application
        - **packages**: Returns settings specific to the Packages application
        - **activity**: Returns settings specific to the Activity application
        - **automation**: Returns settings specific to the Automation application
      parameters:
        - name: aspera_app_type
          in: path
          required: true
          schema:
            type: string
            enum:
              - files
              - packages
              - activity
              - automation
          description: |
            The type of application for which to retrieve settings. Different types return different setting properties.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/app_settings_files'
                  - $ref: '#/components/schemas/app_settings_packages'
                  - $ref: '#/components/schemas/app_settings_activity'
                  - $ref: '#/components/schemas/app_settings_automation'
              examples:
                files:
                  summary: Files application settings
                  value:
                    app_name: Files
                    app_type: files
                    available: true
                    can_managers_share_to_workspace: true
                    can_users_share_to_workspace: true
                    collaboration_whitelist_enabled: false
                    collaboration_with_emails_allowed: true
                packages:
                  summary: Packages application settings
                  value:
                    app_name: Packages
                    app_type: packages
                    available: true
                    can_managers_send_to_workspace: true
                    can_users_send_to_workspace: true
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
      tags:
        - App Types
    put:
      operationId: update_app_settings_by_type
      summary: Update Application Settings by Type
      description: |
        Update organization-level settings for a specific application type.

        **Important**: The request body structure must match the application type specified in the path parameter.
        Use the same structure as returned by the GET endpoint for the corresponding `aspera_app_type`.

        The payload structure varies based on the `aspera_app_type` parameter:
        - **files**: Accepts settings specific to the Files application (e.g., `can_managers_share_to_workspace`, `can_users_share_to_workspace`)
        - **packages**: Accepts settings specific to the Packages application (e.g., `can_managers_send_to_workspace`, `can_users_send_to_workspace`)
        - **activity**: Accepts settings specific to the Activity application
        - **automation**: Accepts settings specific to the Automation application
      parameters:
        - name: aspera_app_type
          in: path
          required: true
          schema:
            type: string
            enum:
              - files
              - packages
              - activity
              - automation
          description: |
            The type of application for which to update settings. The request body must contain properties valid for this application type.
      requestBody:
        required: true
        description: |
          Application settings to update. The structure depends on the `aspera_app_type` path parameter.
          Only include the properties you want to update; omitted properties will retain their current values.

          **Note**: Do NOT include the read-only fields `app_name` and `app_type` in the request body.
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/app_settings_files_update'
                - $ref: '#/components/schemas/app_settings_packages_update'
                - $ref: '#/components/schemas/app_settings_activity_update'
                - $ref: '#/components/schemas/app_settings_automation_update'
            examples:
              files:
                summary: Update Files application settings
                value:
                  can_managers_share_to_workspace: true
                  can_users_share_to_workspace: false
                  collaboration_whitelist_enabled: true
              packages:
                summary: Update Packages application settings
                value:
                  can_managers_send_to_workspace: true
                  can_users_send_to_workspace: true
      responses:
        '200':
          description: OK - Settings updated successfully
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: '#/components/schemas/app_settings_files'
                  - $ref: '#/components/schemas/app_settings_packages'
                  - $ref: '#/components/schemas/app_settings_activity'
                  - $ref: '#/components/schemas/app_settings_automation'
        '204':
          description: No Content
        '400':
          description: Bad Request
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UnauthorizedError'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotFoundError'
        '422':
          description: Unprocessable Entity - Invalid settings for the specified application type
      tags:
        - App Types
