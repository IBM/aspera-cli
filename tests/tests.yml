    - --validate-metadata=yes
    - '@json:@extend:{"name":"$(name) $(TIMESTAMP_TEST_RUN)","recipients":["@preset:awa.shared_inbox_meta@"],"metadata":[{"input_type":"single-text","name":"Project Id","values":["123"]},{"input_type":"single-dropdown","name":"Type","values":["Opt2"]},{"input_type":"multiple-checkbox","name":"CheckThose","values":["Check1","Check2"]},{"input_type":"date","name":"Optional Date","values":["2021-01-13T15:02:00.000Z"]}]}'
    - $(PATH_TST_ASC_LCL)
aocp_send_sh_meta_short:
  depends_on:
    - aocp_recv_init
  template: awa_user_suite
  args:
    - packages
    - send
    - --workspace=@preset:awa.workspace_shared_inbox
    - --validate-metadata=yes
    - '@json:@extend:{"name":"$(name) $(TIMESTAMP_TEST_RUN)","recipients":["@preset:awa.shared_inbox_meta@"],"metadata":{"Project Id":"456","Type":"Opt2","CheckThose":["Check1","Check2"],"Optional Date":"2021-01-13T15:02:00.000Z"}}'
    - $(PATH_TST_ASC_LCL)
aocp_send_sh_meta_short2:
  description: Fails because missing metadata "Project Id"
  tags:
    - must_fail
    - nodoc
  expect: "missing mandatory field: Project Id"
  depends_on:
    - aocp_recv_init
  template: awa_user_suite
  args:
    - packages
    - send
    - --workspace=@preset:awa.workspace_shared_inbox
    - --validate-metadata=yes
    - '@json:@extend:{"name":"$(name) $(TIMESTAMP_TEST_RUN)","recipients":["@preset:awa.shared_inbox_meta@"],"metadata":{"Type":"Opt2","CheckThose":["Check1","Check2"],"Optional Date":"2021-01-13T15:02:00.000Z"}}'
    - $(PATH_TST_ASC_LCL)
aocp_recv_shbx:
  depends_on:
    - aocp_send_shbx
    - aocp_send_sh_meta_long
    - aocp_send_sh_meta_short
  template: awa_user_suite
  args:
    - packages
    - receive
    - ALL
    - --once-only=yes
    - --to-folder=$(TMP)
    - --lock-port=50101
    - --query=@json:@extend:{"dropbox_name":"@preset:awa.shared_inbox_name@","archived":false,"received":true,"has_content":true,"exclude_dropbox_packages":false,"include_draft":false}
    - --ts=@json:{"resume_policy":"sparse_csum","target_rate_kbps":50000}
aocp_list_shbx:
  depends_on:
    - aocp_send_shbx
    - aocp_send_sh_meta_long
    - aocp_send_sh_meta_short
