    - server
    - sync
    - pull
    - "@preset:server.inside_folder"
    - --to-folder=$(PATH_TMP_SYNCS / 'serv_sync_pull_args')
    - '@json:@extend:{"instance":{"quiet":false},"sessions":[{"name":"serv_sync_pull_args","target_rate":"@preset:sync.bps@","reset":true}]}'
