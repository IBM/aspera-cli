    t.stop_process :f5_cert_testb
f5_cert_testc:
  tags:
    - noblock
    - nodoc
  pre: run('openssl', 'req', '-newkey', 'rsa:2048', '-x509', '-days', 365, '-nodes', '-keyout', TMP / 'private_key.pem', '-out', TMP / 'certificate.pem', '-subj', '/CN=MyCert')
  args:
    - faspex5
    - postprocessing
    - '@json:{"url":"https://localhost:18443/domain","certificate":{"cert":"$(TMP / "certificate.pem")","chain":"$(TMP / "certificate.pem")","key":"$(TMP / "private_key.pem")"},"script_folder":"$(PATH_SCRIPTS)"}'
  post: |
    sleep 2
    t.stop_process :f5_cert_testc
f5_cert_testd:
  tags:
    - noblock
    - nodoc
  pre: run('openssl', 'pkcs12', '-export', '-out', TMP / 'certificate.p12', '-inkey', TMP / 'private_key.pem', '-in', TMP / 'certificate.pem', '-name', 'MyCertAlias', '-passout', "pass:#{PKCS_P}")
  args:
    - faspex5
    - postprocessing
    - '@json:{"url":"https://localhost:18443/domain","certificate":{"pkcs12":"$(TMP / "certificate.p12")","key":"$(PKCS_P)"},"script_folder":"$(PATH_SCRIPTS)"}'
  post: |
    sleep 2
    t.stop_process :f5_cert_testd
