serv_upload1:
  depends_on:
    - serv_mkdir
  args:
    - server
    - upload
    - $(PATH_TST_LCL_FILE)
    - --to-folder=@preset:server.inside_folder
    - --ts=@json:{"multi_session":3,"multi_session_threshold":1,"resume_policy":"none","target_rate_kbps":100000}
    - --transfer-info=@json:{"spawn_delay_sec":2.5,"multi_incr_udp":false}
    - --progress-bar=yes
serv_upload_multi_test:
  tags:
    - nodoc
  depends_on:
    - serv_mkdir
  args:
    - server
    - upload
    - faux:///serv_upload_multi_test?1k
    - --to-folder=@preset:server.inside_folder
    - --ts=@json:{"multi_session":2,"multi_session_threshold":1,"resume_policy":"none","target_rate_kbps":100000}
    - --transfer-info=@json:{"multi_incr_udp":true}
serv_upload_multi_test2:
  tags:
    - nodoc
    - noblock
  depends_on:
    - serv_mkdir
  args:
    - server
    - upload
    - faux:///serv_upload_multi_test2?100k
    - --to-folder=@preset:server.inside_folder
    - --ts=@json:{"multi_session":-10,"resume_policy":"none","target_rate_kbps":100}
    - --transfer-info=@json:{"multi_incr_udp":true}
  post: |
    sleep 2
    pid = t.pid_of_test('serv_upload_multi_test2')
    (PATH_CLI_HOME / "send_#{pid}").write({type: 'CANCEL'}.to_json)
    Process.wait(pid)
