f5_fxgw_test:
  description: Test the faspex4->faspex5 gateway.
  tags:
    - nodoc
    - fxgateway
  depends_on:
    - f5_fxgw_start
  args:
    - -N
    - faspex
    - --url=https://localhost:12346/aspera/faspex
    - --username=_unused_
    - --password=_unused_
    - package
    - send
    - --delivery-info=@json:{"recipients":["laurent.martin.aspera@fr.ibm.com"],"title":"gateway aoc"}
    - faux:///test1?1m
  post: |
    Aspera::RestParameters.instance.session_cb = ->(s){s.verify_mode = OpenSSL::SSL::VERIFY_NONE}
    Aspera::Rest.new(base_url: 'https://localhost:12346/aspera/faspex').call(operation: 'POST', subpath: 'send', content_type: Aspera::Mime::TEXT, body: 'bad', exception:false, ret: :resp)
    Aspera::Rest.new(base_url: 'https://localhost:12346/aspera/faspex').call(operation: 'POST', subpath: 'bad', content_type: Aspera::Mime::TEXT, body: 'bad', exception:false, ret: :resp)
    t.stop_process :f5_fxgw_start
f5_postproc_pid:
  tags:
    - noblock
  pre: |
    run('openssl', 'req', '-x509', '-newkey', 'rsa:2048', '-sha256', '-days', 365, '-nodes', '-keyout', TMP / 'key.pem', '-out', TMP / 'cert.pem', '-subj', '/CN=localhost')
    run('openssl', 'pkcs12', '-export', '-out', TMP / 'localhost.p12', '-inkey', TMP / 'key.pem', '-in', TMP / 'cert.pem', '-passout', 'pass:changeit')
  args:
    - faspex5
    - postprocessing
    - '@json:{"url":"https://localhost:8553/asclihook","script_folder":"$(PATH_SCRIPTS)","cert":"$(TMP / "localhost.p12")","key":"changeit"}'
f5_postproc_test:
  depends_on:
