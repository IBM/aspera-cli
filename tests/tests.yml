serv_sync_pull_args_reset:
  description: Sync using args syntax (reset)
  pre: |
    (PATH_TMP_SYNCS / 'serv_sync_pull_args').rmtree
    (PATH_TMP_SYNCS / 'serv_sync_pull_args').mkdir
  tags:
