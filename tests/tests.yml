  args:
    - server
    - upload
    - --to-folder=@extend:@preset:server.upload_folder@/target_hot
    - --lock-port=50101
    - --transfer-info=@json:{"ascp_args":["--remove-after-transfer","--remove-empty-directories","--exclude-newer-than=-8","--src-base","$(PATH_HOT_FOLDER)"]}
    - $(PATH_HOT_FOLDER)
