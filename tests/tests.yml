# Refer to README.md for fields and tags
# --------------------------------------
asession:
  command: asession
  pre: |
    config = conf_data(conf_data('default.server'))
    uri = URI.parse(config['url'])
    remote_host=uri.host
    remote_port=uri.port
    remote_user=config['username']
    remote_pass=config['password']
  args:
    - |
      @json:{"loglevel":"info","spec":{"remote_host":"$(remote_host)","remote_user":"$(remote_user)","ssh_port":$(remote_port),"remote_password":"$(remote_pass)","direction":"receive","destination_root":"$(TMP)","resume_policy":"none","paths":[{"source":"/aspera-test-dir-large/100MB"}]}}
unit:
  $comment: Run spec
  command: null
  tags:
    - nodoc
  pre: Rake::Task[:spec].invoke
