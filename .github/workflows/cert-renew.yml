# Workflow to renew the gem signing certificate
# Triggered manually or automatically 30 days before expiry
name: Renew Gem Signing Certificate

on:
  workflow_dispatch:
  schedule:
    # Run every Monday at 08:00 UTC
    - cron: '0 8 * * 1'

jobs:
  check-and-renew:
    name: Check and renew certificate
    runs-on: ubuntu-latest
    env:
      BUNDLE_WITHOUT: optional:development:special
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "4.0.6"
          bundler-cache: true

      - name: Renew if needed
        env:
          SIGNING_KEY: ${{ secrets.PRIVATE_KEY_PEM }}
        run: bundle exec rake certs:renew_if_needed

      - name: Check if certificate was renewed
        id: check
        run: echo "changed=$(git diff --quiet certs/aspera-cli-public-cert.pem && echo false || echo true)" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        id: pr
        if: steps.check.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.RELEASE_TOKEN }}
          commit-message: "chore: renew gem signing certificate"
          branch: cert-renew
          title: "chore: renew gem signing certificate"
          body: |
            The gem signing certificate was renewed automatically by the `cert-renew` workflow.
            Please review and merge.
          labels: maintenance

      - name: Open issue to notify maintainer
        if: steps.check.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          gh issue create \
            --title "⚠️ Gem signing certificate expiring soon — please merge cert-renew PR" \
            --body "A new gem signing certificate has been generated and a pull request is ready: ${{ steps.pr.outputs.pull-request-url }}" \
            --label maintenance
