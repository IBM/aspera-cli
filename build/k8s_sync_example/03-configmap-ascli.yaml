apiVersion: v1
kind: ConfigMap
metadata:
  name: aspera-ascli-config
  namespace: aspera  # Created in: 01-namespace.yaml
data:
  # ascli configuration (YAML format)
  ascli.yaml: |
    # ascli configuration
    config:
      version: 1
    default:
      server: server_config
    server_config:
      url: ssh://eudemo.asperademo.com
      username: aspera
      password: "@env:XFER_PASSWORD"
    data:
      source_pvcl: "s3://s3.amazonaws.com/my-bucket"
      conf: # schema: lib/sync/conf.schema.yaml
        mode: continuous
        local_db_dir: /sync_db
        transport:
          target_rate: 100000000
