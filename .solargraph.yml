---
include:
- "**/*.rb"
exclude:
- spec/**/*
- tests/**/*
- ".bundle/**/*"
- ".ruby-lsp/**/*"
- ".tmp-openapi-venv/**/*"
- "build/**/*"
- "rakelib/**/*"
require: []
domains: []
reporters:
- require_not_found
formatter:
  rubocop:
    cops: safe
    except: []
    only: []
    extra_args: []
type_checker:
  rules: {}
require_paths: []
plugins: []
max_files: 5000
# Performance optimizations
definitions: true
references: true
folding: true
symbols: true
